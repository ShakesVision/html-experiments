<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png" />

    <title>Material Feed Reader</title>    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <style>
      body {
        background: #fafafa;
      }

      .toolbar {
        backdrop-filter: blur(10px);
      }

      .post {
        margin-bottom: 36px;
      }

      .sidebar {
        transition: transform 0.25s;
      }

      .sidebar-hidden {
        transform: translateX(-100%);
      }

      .immersive .toolbar {
        display: none;
      }

      .page-btn {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      .page-current {
        background: #2563eb;
        color: white;
      }

      .reader-font {
        line-height: 1.75;
        max-width: 850px;
        margin: auto;
      }
    </style>
      <script defer src="../assets/js/shared-init.js"></script>
    <link rel="canonical" href="https://tools.shakeeb.in/rss-reader/index.html">
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#1b4965">
</head>

  <body class="flex flex-col h-screen">
    <!-- toolbar -->

    <div
      id="toolbar"
      class="toolbar sticky top-0 bg-white shadow p-2 flex gap-2 items-center z-10"
    >
      <input
        id="feedUrl"
        class="border p-1 flex-1 rounded"
        placeholder="Paste RSS feed or Blogger blog URL"
      />

      <button onclick="Reader.loadFeed()" class="material-icons">
        download
      </button>

      <button onclick="UI.toggleSidebar()" class="material-icons">list</button>

      <button onclick="UI.toggleSettings()" class="material-icons">
        settings
      </button>

      <button onclick="UI.toggleImmersive()" class="material-icons">
        fullscreen
      </button>

      <input
        id="postSearch"
        placeholder="search posts"
        class="border p-1 rounded"
      />

      <button onclick="Reader.searchPosts()" class="material-icons">
        search
      </button>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <!-- sidebar -->

      <div
        id="sidebar"
        class="sidebar w-72 bg-white shadow overflow-y-auto sidebar-hidden"
      >
        <div class="p-2 border-b flex gap-2">
          <input
            id="titleSearch"
            placeholder="Search titles"
            class="border p-1 flex-1"
          />

          <button onclick="Reader.filterTitles()" class="material-icons">
            search
          </button>
        </div>

        <ol id="postIndex" class="text-sm p-2 list-decimal"></ol>
      </div>

      <!-- content -->

      <div class="flex-1 overflow-y-auto p-6">
        <div id="posts" class="reader-font"></div>

        <div class="flex justify-center gap-2 mt-8" id="pagination"></div>
      </div>
    </div>

    <!-- settings -->

    <div
      id="settings"
      class="fixed right-0 top-0 w-72 h-full bg-white shadow p-4 hidden overflow-y-auto"
    >
      <h2 class="font-bold mb-3">Reader Settings</h2>

      <label>Posts per page</label>
      <input
        id="postsPerPage"
        type="number"
        value="5"
        class="border w-full p-1 mb-3"
      />

      <label>Font URL (.woff/.ttf)</label>
      <input id="fontUrl" class="border w-full p-1" />
      <button onclick="Reader.loadFont()" class="material-icons mb-3">
        font_download
      </button>

      <label>Direction</label>
      <select id="direction" class="border w-full mb-3">
        <option value="ltr">LTR</option>
        <option value="rtl">RTL</option>
      </select>

      <label>Alignment</label>
      <select id="alignment" class="border w-full mb-3">
        <option>left</option>
        <option>right</option>
        <option>center</option>
        <option>justify</option>
      </select>

      <div class="flex gap-2 items-center mb-3">
        <button onclick="Reader.fontMinus()" class="border px-2">-A</button>

        <input id="fontSize" value="18" class="border w-16 text-center" />

        <button onclick="Reader.fontPlus()" class="border px-2">+A</button>
      </div>

      <div class="flex gap-2 items-center mb-3">
        <label>Render HTML</label>
        <input id="renderHtml" type="checkbox" />
      </div>

      <button onclick="Reader.applySettings()" class="border p-2 w-full">
        Apply
      </button>
    </div>

    <script>
      const State = {
        posts: [],
        currentPage: 1,
        settings: {
          postsPerPage: 5,
          fontSize: 18,
          renderHtml: false,
          direction: "ltr",
          alignment: "left",
        },
      };

      const UI = {
        toggleSidebar() {
          document.getElementById("sidebar").classList.toggle("sidebar-hidden");
        },

        toggleSettings() {
          document.getElementById("settings").classList.toggle("hidden");
        },

        toggleImmersive() {
          document.body.classList.toggle("immersive");
        },
      };

      const Reader = {
        async loadFeed() {
          const url = document.getElementById("feedUrl").value.trim();

          if (!url) return;

          if (url.includes("blogspot") || url.includes("blogger")) {
            await this.loadBlogger(url);
          } else {
            await this.loadRSS(url);
          }

          State.currentPage = 1;

          this.render();

          this.buildIndex();
        },

        /* BLOGGER JSONP */

        jsonp(url) {
          return new Promise((resolve) => {
            const cb = "jsonp_" + Math.random().toString(36).substring(2);

            window[cb] = (data) => {
              delete window[cb];
              script.remove();
              resolve(data);
            };

            const script = document.createElement("script");

            script.src = url + "&callback=" + cb;

            document.body.appendChild(script);
          });
        },

        async loadBlogger(blog) {
          State.posts = [];

          let startIndex = 1;

          blog = blog.replace(/\/$/, "");

          while (true) {
            const url = `${blog}/feeds/posts/default?alt=json-in-script&max-results=500&start-index=${startIndex}`;

            const data = await this.jsonp(url);

            const entries = data?.feed?.entry || [];

            console.log("Entries returned:", entries.length);

            if (entries.length === 0) break;

            entries.forEach((e) => {
              State.posts.push({
                title: e.title?.$t || "",
                content: e.content?.$t || "",
                link: e.link?.find((l) => l.rel === "alternate")?.href || "",
              });
            });

            startIndex += entries.length;
          }
        },

        /* RSS loader with fallbacks */

        async loadRSS(url) {
          try {
            const res = await fetch(url);

            const text = await res.text();

            this.parseRSS(text);

            return;
          } catch {}

          const services = [
            `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,

            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
          ];

          for (const s of services) {
            try {
              const r = await fetch(s);

              const t = await r.text();

              this.parseRSS(t);

              return;
            } catch {}
          }

          alert("Failed to load feed");
        },

        parseRSS(xmlText) {
          const parser = new DOMParser();

          const xml = parser.parseFromString(xmlText, "text/xml");

          const items = [...xml.querySelectorAll("item,entry")];

          State.posts = items.map((i) => ({
            title: i.querySelector("title")?.textContent || "",

            content: i.querySelector("content,description")?.textContent || "",

            link: i.querySelector("link")?.textContent || "",
          }));
        },

        render() {
          const start = (State.currentPage - 1) * State.settings.postsPerPage;

          const end = start + State.settings.postsPerPage;

          const posts = State.posts.slice(start, end);

          const container = document.getElementById("posts");

          container.style.fontSize = State.settings.fontSize + "px";

          container.style.direction = State.settings.direction;

          container.style.textAlign = State.settings.alignment;

          let html = "";

          posts.forEach((p, i) => {
            let content = State.settings.renderHtml
              ? p.content
              : this.strip(p.content);

            html += `
<div class="post">
<h2 class="font-bold text-xl">${start + i + 1}. ${p.title}</h2>
<div>${content}</div>
</div>
`;
          });

          container.innerHTML = html;

          this.renderPagination();
        },

        renderPagination() {
          const total = Math.ceil(
            State.posts.length / State.settings.postsPerPage,
          );

          let html = "";

          html += `<button class="page-btn" onclick="Reader.gotoPage(1)">First</button>`;

          for (let i = 1; i <= total; i++) {
            html += `<button class="page-btn ${i === State.currentPage ? "page-current" : ""}" onclick="Reader.gotoPage(${i})">${i}</button>`;
          }

          html += `<button class="page-btn" onclick="Reader.gotoPage(${total})">Last</button>`;

          document.getElementById("pagination").innerHTML = html;
        },

        gotoPage(p) {
          State.currentPage = p;

          this.render();
        },

        buildIndex() {
          const list = document.getElementById("postIndex");

          list.innerHTML = "";

          State.posts.forEach((p, i) => {
            const li = document.createElement("li");

            const a = document.createElement("a");

            a.href = "#";

            a.textContent = p.title;

            a.onclick = () => {
              State.currentPage =
                Math.floor(i / State.settings.postsPerPage) + 1;

              this.render();
            };

            li.appendChild(a);

            list.appendChild(li);
          });
        },

        filterTitles() {
          const q = document.getElementById("titleSearch").value.toLowerCase();

          document.querySelectorAll("#postIndex li").forEach((li) => {
            li.style.display = li.innerText.toLowerCase().includes(q)
              ? ""
              : "none";
          });
        },

        searchPosts() {
          const q = document.getElementById("postSearch").value.toLowerCase();

          const i = State.posts.findIndex(
            (p) =>
              p.title.toLowerCase().includes(q) ||
              p.content.toLowerCase().includes(q),
          );

          if (i >= 0) {
            State.currentPage = Math.floor(i / State.settings.postsPerPage) + 1;

            this.render();
          }
        },

        strip(html) {
          const d = document.createElement("div");

          d.innerHTML = html;

          return d.textContent;
        },

        fontPlus() {
          State.settings.fontSize++;

          document.getElementById("fontSize").value = State.settings.fontSize;

          this.render();
        },

        fontMinus() {
          State.settings.fontSize--;

          document.getElementById("fontSize").value = State.settings.fontSize;

          this.render();
        },

        applySettings() {
          State.settings.postsPerPage = parseInt(
            document.getElementById("postsPerPage").value,
          );

          State.settings.fontSize = parseInt(
            document.getElementById("fontSize").value,
          );

          State.settings.renderHtml =
            document.getElementById("renderHtml").checked;

          State.settings.direction = document.getElementById("direction").value;

          State.settings.alignment = document.getElementById("alignment").value;

          this.render();
        },

        loadFont() {
          const url = document.getElementById("fontUrl").value;

          const name = "readerFont";

          const style = document.createElement("style");

          style.innerHTML = `@font-face{font-family:${name};src:url(${url});}
.reader-font{font-family:${name},serif;}`;

          document.head.appendChild(style);
        },
      };

      /* keyboard navigation */

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") Reader.gotoPage(State.currentPage + 1);

        if (e.key === "ArrowLeft") Reader.gotoPage(State.currentPage - 1);
      });
    </script>
  </body>
</html>
