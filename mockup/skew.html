<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tilt Studio — WebGL Export Perfect</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at top left, #312e81, transparent 30%),
          radial-gradient(circle at bottom right, #7e22ce, transparent 30%),
          linear-gradient(135deg, #0f172a, #111827);
      }

      canvas {
        display: block;
      }

      .glass {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body class="text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
      <h1
        class="text-4xl font-black mb-8 bg-gradient-to-r from-pink-400 to-purple-400 text-transparent bg-clip-text"
      >
        3D Tilt Studio — REAL Export
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- CONTROLS -->
        <div class="glass rounded-2xl p-6 space-y-6">
          <div>
            <label class="font-bold">Upload Image</label>
            <input
              type="file"
              id="imageInput"
              accept="image/*"
              class="mt-3 block w-full"
            />
          </div>

          <div id="controls" class="space-y-5"></div>

          <button
            id="downloadBtn"
            class="w-full py-3 rounded-xl bg-gradient-to-r from-pink-500 to-purple-500 font-bold hover:scale-[1.02] transition"
          >
            Download PNG
          </button>
        </div>

        <!-- PREVIEW -->
        <div
          class="lg:col-span-2 glass rounded-2xl overflow-hidden relative min-h-[700px]"
        >
          <div id="canvasContainer" class="w-full h-full"></div>
        </div>
      </div>
    </div>

    <!-- THREE.JS -->
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

      const CONFIG = [
        {
          id: "perspective",
          label: "Perspective",
          min: 20,
          max: 120,
          step: 1,
          value: 45,
        },
        {
          id: "rotateX",
          label: "Rotate X",
          min: -80,
          max: 80,
          step: 1,
          value: 0,
        },
        {
          id: "rotateY",
          label: "Rotate Y",
          min: -80,
          max: 80,
          step: 1,
          value: 0,
        },
        {
          id: "rotateZ",
          label: "Rotate Z",
          min: -180,
          max: 180,
          step: 1,
          value: 0,
        },
        { id: "skewX", label: "Skew X", min: -1, max: 1, step: 0.01, value: 0 },
        { id: "skewY", label: "Skew Y", min: -1, max: 1, step: 0.01, value: 0 },
        { id: "scale", label: "Scale", min: 0.1, max: 3, step: 0.01, value: 1 },
      ];

      const controlsDiv = document.getElementById("controls");

      controlsDiv.innerHTML = CONFIG.map(
        (c) => `
  <div>
    <div class="flex justify-between mb-1">
      <label class="font-semibold">${c.label}</label>
      <span id="${c.id}Val">${c.value}</span>
    </div>

    <input
      id="${c.id}"
      type="range"
      min="${c.min}"
      max="${c.max}"
      step="${c.step}"
      value="${c.value}"
    />
  </div>
`,
      ).join("");

      const container = document.getElementById("canvasContainer");

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        2000,
      );

      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true,
      });

      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(container.clientWidth, container.clientHeight);

      container.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 1.2));

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
      dirLight.position.set(3, 3, 5);
      scene.add(dirLight);

      let mesh = null;
      let geometry = null;
      let material = null;
      let texture = null;

      function createMesh(texture) {
        if (mesh) {
          scene.remove(mesh);
          geometry.dispose();
          material.dispose();
        }

        const aspect = texture.image.width / texture.image.height;

        geometry = new THREE.PlaneGeometry(4 * aspect, 4, 20, 20);

        material = new THREE.MeshPhysicalMaterial({
          map: texture,
          transparent: true,
          side: THREE.DoubleSide,
          roughness: 0.3,
          metalness: 0.1,
        });

        mesh = new THREE.Mesh(geometry, material);

        scene.add(mesh);

        updateTransforms();
      }

      function applySkew(skewX, skewY) {
        if (!mesh) return;

        geometry.computeBoundingBox();

        const pos = geometry.attributes.position;

        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i);
          const y = pos.getY(i);

          pos.setX(i, x + y * skewX);
          pos.setY(i, y + x * skewY);
        }

        pos.needsUpdate = true;
      }

      function resetGeometry() {
        if (!texture || !mesh) return;

        const aspect = texture.image.width / texture.image.height;

        geometry.dispose();

        geometry = new THREE.PlaneGeometry(4 * aspect, 4, 20, 20);

        mesh.geometry = geometry;
      }

      function updateTransforms() {
        if (!mesh) return;

        const val = (id) => parseFloat(document.getElementById(id).value);

        CONFIG.forEach((c) => {
          document.getElementById(c.id + "Val").textContent =
            document.getElementById(c.id).value;
        });

        camera.fov = val("perspective");
        camera.updateProjectionMatrix();

        mesh.rotation.x = THREE.MathUtils.degToRad(val("rotateX"));
        mesh.rotation.y = THREE.MathUtils.degToRad(val("rotateY"));
        mesh.rotation.z = THREE.MathUtils.degToRad(val("rotateZ"));

        mesh.scale.setScalar(val("scale"));

        resetGeometry();

        applySkew(val("skewX"), val("skewY"));
      }

      CONFIG.forEach((c) => {
        document
          .getElementById(c.id)
          .addEventListener("input", updateTransforms);
      });

      document.getElementById("imageInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = (ev) => {
          const loader = new THREE.TextureLoader();

          loader.load(ev.target.result, (tex) => {
            texture = tex;

            tex.colorSpace = THREE.SRGBColorSpace;

            createMesh(tex);
          });
        };

        reader.readAsDataURL(file);
      });

      document.getElementById("downloadBtn").addEventListener("click", () => {
        renderer.render(scene, camera);

        const link = document.createElement("a");

        link.download = "3d-tilt-export.png";

        link.href = renderer.domElement.toDataURL("image/png");

        link.click();
      });

      function animate() {
        requestAnimationFrame(animate);

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener("resize", () => {
        camera.aspect = container.clientWidth / container.clientHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(container.clientWidth, container.clientHeight);
      });
    </script>
  </body>
</html>
