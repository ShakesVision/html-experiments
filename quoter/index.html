<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quoter</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg-page: #f5f2eb;
        --bg-panel: #fcfaf6;
        --ink-main: #1f2937;
        --ink-soft: #6b7280;
        --line: #d6d3ce;
        --accent: #8b5e3c;
        --quote-bg: #fffdf8;
        --quote-line: #d8cbbd;
        --quote-mark: #b69478;
        --font-sans: "Segoe UI", "Inter", Roboto, Arial, sans-serif;
        --font-serif: Georgia, Cambria, "Times New Roman", serif;
        --font-urdu:
          "Payami Nastaleeq", "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq",
          serif;
        --font-urdu-alt: "Noto Nastaliq Urdu", "Noto Naskh Arabic", serif;
      }

      body {
        font-family: var(--font-sans);
        background: radial-gradient(
          circle at top left,
          #fff9ef 0%,
          var(--bg-page) 56%,
          #efe7da 100%
        );
        color: var(--ink-main);
      }

      .ur {
        font-family: var(--font-urdu);
        line-height: 1.95;
      }

      .en {
        font-family: var(--font-serif);
        line-height: 1.6;
      }

      .ur-input {
        font-family: var(--font-urdu);
        line-height: 1.9;
      }

      .quote-card {
        border: 1px solid var(--quote-line);
        background: linear-gradient(
          165deg,
          #fffefc 0%,
          var(--quote-bg) 70%,
          #faf4ec 100%
        );
        box-shadow: 0 18px 36px -30px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
      }

      .quote-card::before,
      .quote-card::after {
        position: absolute;
        color: var(--quote-mark);
        opacity: 0.3;
        font-family: var(--font-serif);
        line-height: 1;
        pointer-events: none;
        transition: all 140ms ease;
      }

      .quote-card::before {
        content: "\201C";
        top: 0.45rem;
        left: 0.9rem;
        font-size: 4.3rem;
      }

      .quote-card::after {
        content: "\201D";
        bottom: -0.65rem;
        right: 0.9rem;
        font-size: 4.3rem;
      }

      .quote-card.ur-quotes::before {
        content: "\201D";
        top: 0.45rem;
        right: 0.9rem;
        left: auto;
      }

      .quote-card.ur-quotes::after {
        content: "\201C";
        bottom: -0.65rem;
        left: 0.9rem;
        right: auto;
      }

      .quote-separator {
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          #b48b6b,
          transparent
        );
      }

      .present .workspace {
        display: block;
        padding: 0;
      }

      .present #controlsPanel {
        display: none;
      }

      .present #previewPanel {
        width: 100%;
        max-width: none;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .present #previewCard {
        min-height: 100vh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1rem;
      }

      .present #previewInner {
        width: min(1020px, 92vw);
      }

      #presentExitBtn {
        display: none;
      }

      .present #presentExitBtn {
        display: inline-flex;
      }

      .curator-dropdown {
        max-height: 220px;
        overflow-y: auto;
        scrollbar-width: thin;
      }

      .curator-list {
        max-height: 240px;
        overflow-y: auto;
        scrollbar-width: thin;
      }

      .note-editor {
        min-height: 92px;
        max-height: 180px;
        overflow-y: auto;
      }

      .note-editor:focus {
        outline: none;
      }

      .private-chip {
        background: #f6e7b7;
        border: 1px dashed #d4a72c;
        border-radius: 4px;
        padding: 0 2px;
      }

      .public-note-content {
        line-height: 1.65;
      }

      #previewQuote p {
        margin: 0 0 0.7em 0;
      }

      #previewQuote p:last-child {
        margin-bottom: 0;
      }

      .public-note-content a {
        color: #1d4ed8;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .tab-btn.active {
        background: #ffffff;
        border-color: #c7bcb1;
        color: #1f2937;
      }

      .tab-pane {
        display: none;
      }

      .tab-pane.active {
        display: block;
      }
    </style>
      <script defer src="../assets/js/shared-init.js"></script>
</head>
  <body class="min-h-screen">
    <button
      id="presentExitBtn"
      type="button"
      class="fixed right-4 top-4 z-50 rounded-lg border border-gray-300 bg-white/95 px-3 py-2 text-xs font-medium text-gray-700 shadow backdrop-blur hover:bg-white"
    >
      Exit Present
    </button>

    <main class="workspace min-h-screen p-2.5 md:p-3">
      <div
        class="mx-auto grid max-w-[1500px] gap-3 lg:grid-cols-[minmax(370px,1fr)_minmax(560px,1.45fr)]"
      >
        <section
          id="controlsPanel"
          class="rounded-xl border border-[var(--line)] bg-[var(--bg-panel)] p-2.5 md:p-3 shadow-sm"
        >
          <div class="mb-2 flex items-center justify-between gap-2">
            <h1 class="text-sm font-semibold tracking-tight">Quoter Curator</h1>
            <div class="flex items-center gap-1.5">
              <button
                id="newQuoteBtn"
                type="button"
                class="rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] font-medium text-gray-700 hover:bg-gray-50"
              >
                New
              </button>
              <button
                id="saveQuoteBtn"
                type="button"
                class="rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] font-medium text-gray-700 hover:bg-gray-50"
              >
                Save
              </button>
              <button
                id="presentBtn"
                type="button"
                class="rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] font-medium text-gray-700 hover:bg-gray-50"
              >
                Present
              </button>
            </div>
          </div>

          <div
            class="mb-2 flex items-center justify-between gap-2 rounded-md border border-[var(--line)] bg-white px-2 py-1.5"
          >
            <p
              id="editingState"
              class="truncate text-[11px] font-medium text-gray-700"
            >
              Creating new quote
            </p>
            <p class="text-[10px] text-gray-500">Ctrl+S save/update</p>
          </div>

          <div class="mb-2 grid grid-cols-2 gap-2">
            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Language</span
              >
              <select
                id="languageSelect"
                class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
              >
                <option value="ur" selected>Urdu</option>
                <option value="en">English</option>
              </select>
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Quote Source</span
              >
              <span
                class="inline-flex w-full items-center justify-between rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px]"
              >
                <span class="text-gray-700">Selected Text</span>
                <input
                  id="selectionToggle"
                  type="checkbox"
                  class="h-4 w-4 accent-[var(--accent)]"
                  checked
                />
              </span>
            </label>
          </div>

          <div
            class="mb-2 flex gap-1.5 rounded-md border border-[var(--line)] bg-[var(--bg-panel)] p-1"
          >
            <button
              id="tabQuoteBtn"
              class="tab-btn active flex-1 rounded border border-transparent px-2 py-1 text-[11px] font-medium text-gray-600"
              data-tab="quote"
              type="button"
            >
              Quote
            </button>
            <button
              id="tabCuratorBtn"
              class="tab-btn flex-1 rounded border border-transparent px-2 py-1 text-[11px] font-medium text-gray-600"
              data-tab="curator"
              type="button"
            >
              Curator
            </button>
            <button
              id="tabNotesBtn"
              class="tab-btn flex-1 rounded border border-transparent px-2 py-1 text-[11px] font-medium text-gray-600"
              data-tab="notes"
              type="button"
            >
              Notes
            </button>
            <button
              id="tabStyleBtn"
              class="tab-btn flex-1 rounded border border-transparent px-2 py-1 text-[11px] font-medium text-gray-600"
              data-tab="style"
              type="button"
            >
              Style
            </button>
          </div>

          <div id="tabQuote" class="tab-pane active space-y-2">
            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Heading (optional)</span
              >
              <input
                id="headingInput"
                type="text"
                class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
              />
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Reference (optional)</span
              >
              <input
                id="referenceInput"
                type="text"
                class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
              />
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Typing Fix Box (not shown in quote)</span
              >
              <input
                id="searchInput"
                type="text"
                class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
              />
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Load .txt</span
              >
              <input
                id="fileInput"
                type="file"
                accept=".txt,text/plain"
                class="block w-full text-[11px] text-gray-700 file:mr-1.5 file:rounded-md file:border file:border-[var(--line)] file:bg-white file:px-2 file:py-1 file:text-[11px] file:font-medium file:text-gray-700 hover:file:bg-gray-50"
              />
            </label>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Source Text (paste or upload)</span
              >
              <textarea
                id="sourceText"
                rows="8"
                class="w-full resize-y rounded-md border border-[var(--line)] bg-white p-2 text-[11px] leading-5 outline-none focus:border-[var(--accent)]"
                placeholder="Paste text here. Select any part to show in quote when Selected Text is ON."
              ></textarea>
            </label>
          </div>

          <div id="tabCurator" class="tab-pane space-y-2">
            <div class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Transfer</span
              >
              <div class="flex gap-1.5">
                <button
                  id="exportBtn"
                  type="button"
                  class="flex-1 rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] font-medium text-gray-700 hover:bg-gray-50"
                >
                  Export
                </button>
                <button
                  id="importBtn"
                  type="button"
                  class="flex-1 rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] font-medium text-gray-700 hover:bg-gray-50"
                >
                  Import
                </button>
              </div>
              <label class="flex items-center gap-1 text-[10px] text-gray-600">
                <input
                  id="replaceOnImport"
                  type="checkbox"
                  class="h-3.5 w-3.5 accent-[var(--accent)]"
                />
                Replace on import
              </label>
            </div>

            <div class="rounded-md border border-[var(--line)] bg-white p-2">
              <div class="relative">
                <input
                  id="curatorSearch"
                  type="text"
                  placeholder="Find by heading / quote / reference / notes"
                  class="w-full rounded-md border border-[var(--line)] px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
                />
                <div
                  id="curatorDropdown"
                  class="curator-dropdown absolute left-0 right-0 top-full z-20 mt-1 hidden rounded-md border border-[var(--line)] bg-white p-1 shadow"
                ></div>
              </div>

              <div
                class="mt-2 flex items-center justify-between text-[10px] text-gray-600"
              >
                <p id="curatorCount">0 quotes</p>
                <p id="curatorHint">Pinned stay on top</p>
              </div>

              <div id="curatorList" class="curator-list mt-1.5 space-y-1"></div>
            </div>
          </div>

          <div id="tabNotes" class="tab-pane space-y-2">
            <div
              class="space-y-1 rounded-md border border-[var(--line)] bg-white p-1.5"
            >
              <div class="flex items-center justify-between gap-2">
                <span class="text-[11px] font-medium text-gray-700"
                  >Notes (saved with quote)</span
                >
                <div class="flex flex-wrap items-center gap-1 text-[10px]">
                  <button
                    id="noteBoldBtn"
                    type="button"
                    class="rounded border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-0.5 font-semibold"
                  >
                    B
                  </button>
                  <button
                    id="noteItalicBtn"
                    type="button"
                    class="rounded border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-0.5 italic"
                  >
                    I
                  </button>
                  <button
                    id="noteLinkBtn"
                    type="button"
                    class="rounded border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-0.5"
                  >
                    Link
                  </button>
                  <button
                    id="notePrivateBtn"
                    type="button"
                    class="rounded border border-amber-300 bg-amber-50 px-1.5 py-0.5 text-amber-800"
                  >
                    Private
                  </button>
                  <button
                    id="noteClearBtn"
                    type="button"
                    class="rounded border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-0.5"
                  >
                    Clear
                  </button>
                </div>
              </div>
              <div
                id="noteEditor"
                contenteditable="true"
                class="note-editor rounded-md border border-[var(--line)] p-2 text-[11px]"
              ></div>
              <p class="text-[10px] text-gray-500">
                Private text is saved but hidden in right-side output.
              </p>
            </div>
          </div>

          <div id="tabStyle" class="tab-pane space-y-2">
            <div class="grid grid-cols-3 gap-2">
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700"
                  >Quote Font</span
                >
                <select
                  id="fontSelect"
                  class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
                >
                  <option value="auto" selected>Auto</option>
                  <option value="urdu-main">Urdu Payami</option>
                  <option value="urdu-alt">Urdu Noto</option>
                  <option value="english-serif">Eng Serif</option>
                  <option value="english-sans">Eng Sans</option>
                </select>
              </label>
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700"
                  >Quote Size</span
                >
                <input
                  id="fontSizeInput"
                  type="range"
                  min="16"
                  max="54"
                  step="1"
                  value="28"
                  class="w-full accent-[var(--accent)]"
                />
              </label>
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700">Line</span>
                <input
                  id="lineHeightInput"
                  type="range"
                  min="1.2"
                  max="2.5"
                  step="0.05"
                  value="1.95"
                  class="w-full accent-[var(--accent)]"
                />
              </label>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700"
                  >Heading Size</span
                >
                <input
                  id="headingSizeInput"
                  type="range"
                  min="12"
                  max="42"
                  step="1"
                  value="20"
                  class="w-full accent-[var(--accent)]"
                />
              </label>
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700"
                  >Reference Size</span
                >
                <input
                  id="referenceSizeInput"
                  type="range"
                  min="10"
                  max="28"
                  step="1"
                  value="14"
                  class="w-full accent-[var(--accent)]"
                />
              </label>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700">Theme</span>
                <select
                  id="themeSelect"
                  class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
                >
                  <option value="parchment" selected>Parchment</option>
                  <option value="night">Night</option>
                  <option value="emerald">Emerald</option>
                  <option value="rosewood">Rosewood</option>

                  <option value="ocean">Ocean</option>
                  <option value="sunset">Sunset</option>
                  <option value="frost">Frost</option>
                  <option value="coffee">Coffee</option>
                  <option value="aurora">Aurora</option>
                  <option value="amoled">AMOLED</option>
                  <option value="pastel">Pastel</option>
                  <option value="lava">Lava</option>
                  <option value="forest">Forest</option>
                  <option value="neon">Neon</option>
                  <option value="vintage">Vintage</option>
                  <option value="royal">Royal</option>
                </select>
              </label>
              <label class="space-y-1">
                <span class="text-[11px] font-medium text-gray-700"
                  >Custom Text Color</span
                >
                <input
                  id="customTextColorInput"
                  type="text"
                  placeholder="#1f2937 / rgb(...) / hsl(...)"
                  class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
                />
              </label>
            </div>

            <label class="space-y-1">
              <span class="text-[11px] font-medium text-gray-700"
                >Custom Background (full CSS background)</span
              >
              <input
                id="customBackgroundInput"
                type="text"
                placeholder="#fff, linear-gradient(...), url(...) center/cover no-repeat"
                class="w-full rounded-md border border-[var(--line)] bg-white px-2 py-1 text-[11px] outline-none focus:border-[var(--accent)]"
              />
            </label>
          </div>

          <p id="statusText" class="mt-2 min-h-4 text-[10px] text-gray-500"></p>
        </section>

        <section
          id="previewPanel"
          class="rounded-xl border border-[var(--line)] bg-[var(--bg-panel)] p-2 md:p-3"
        >
          <article
            id="previewCard"
            class="quote-card relative rounded-xl p-5 md:p-8 lg:p-10"
          >
            <div id="previewInner" class="mx-auto max-w-4xl">
              <div id="previewHeadingWrap" class="hidden">
                <h2
                  id="previewHeading"
                  class="text-base font-semibold text-[var(--accent)] md:text-lg"
                ></h2>
                <div class="quote-separator my-2.5 md:my-3"></div>
              </div>

              <blockquote
                id="previewQuote"
                class="hidden whitespace-pre-wrap break-words text-xl leading-[1.9] text-[var(--ink-main)] md:text-2xl"
                style="text-align: justify"
              ></blockquote>

              <div
                id="quoteRefSeparator"
                class="quote-separator my-3 md:my-4 hidden"
              ></div>
              <p
                id="previewReference"
                class="hidden text-left text-xs text-[var(--ink-soft)] md:text-sm"
              ></p>
            </div>
          </article>

          <article
            id="notesPublicCard"
            class="mt-2.5 hidden rounded-xl border border-[var(--line)] bg-white/85 p-3"
          >
            <h3 class="text-xs font-semibold text-gray-700">Notes & Links</h3>
            <div
              id="notesPublicContent"
              class="public-note-content mt-1.5 text-xs text-gray-700"
            ></div>
            <div id="notesLinksList" class="mt-2 space-y-1"></div>
          </article>
        </section>
      </div>
    </main>

    <input
      id="importFileInput"
      type="file"
      accept=".json,application/json"
      class="hidden"
    />

    <script>
      const DB_NAME = "quoter-curator-db";
      const DB_VERSION = 1;
      const STORE_QUOTES = "quotes";
      const THEMES = {
        // 📜 Parchment (classic reading feel)
        parchment: {
          cardBg:
            "linear-gradient(165deg, #fffefc 0%, #fffdf8 70%, #faf4ec 100%)",
          quoteColor: "#1f2937",
          headingColor: "#8b5e3c",
          referenceColor: "#6b7280",
          borderColor: "#d8cbbd",
          markColor: "#b69478",
        },

        // 🌙 Night (dark minimal)
        night: {
          cardBg: "linear-gradient(170deg, #0f172a 0%, #111827 100%)",
          quoteColor: "#e5e7eb",
          headingColor: "#f3f4f6",
          referenceColor: "#9ca3af",
          borderColor: "#374151",
          markColor: "#9ca3af",
        },

        // 🌿 Emerald (fresh green)
        emerald: {
          cardBg: "linear-gradient(160deg, #f0fdf4 0%, #dcfce7 100%)",
          quoteColor: "#065f46",
          headingColor: "#047857",
          referenceColor: "#047857",
          borderColor: "#86efac",
          markColor: "#059669",
        },

        // 🌹 Rosewood (soft red/pink)
        rosewood: {
          cardBg: "linear-gradient(160deg, #fff1f2 0%, #ffe4e6 100%)",
          quoteColor: "#4c0519",
          headingColor: "#9f1239",
          referenceColor: "#6b7280",
          borderColor: "#fecdd3",
          markColor: "#be123c",
        },

        // 🌊 Ocean
        ocean: {
          cardBg: "linear-gradient(160deg, #eff6ff 0%, #dbeafe 100%)",
          quoteColor: "#1e3a8a",
          headingColor: "#1d4ed8",
          referenceColor: "#475569",
          borderColor: "#93c5fd",
          markColor: "#3b82f6",
        },

        // 🌅 Sunset
        sunset: {
          cardBg:
            "linear-gradient(160deg, #fff7ed 0%, #ffe4e6 50%, #fde68a 100%)",
          quoteColor: "#7c2d12",
          headingColor: "#ea580c",
          referenceColor: "#78716c",
          borderColor: "#fdba74",

      function nowIso() {
        return new Date().toISOString();
      }

      function safeTrim(value) {
        return (value || "").trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function showStatus(message, isError = false) {
        els.statusText.textContent = message;
        els.statusText.classList.toggle("text-red-600", isError);
        els.statusText.classList.toggle("text-gray-500", !isError);
      }

      function activateTab(tabName) {
        state.activeTab = tabName;
        const tabs = ["quote", "curator", "notes", "style"];
        for (const name of tabs) {
          const btn = document.getElementById(
            `tab${name[0].toUpperCase()}${name.slice(1)}Btn`,
          );
          const pane = document.getElementById(
            `tab${name[0].toUpperCase()}${name.slice(1)}`,
          );
          btn.classList.toggle("active", name === tabName);
          pane.classList.toggle("active", name === tabName);
        }
      }

      function setEditingState(id, heading = "") {
        state.editingId = id;
        if (id) {
          els.editingState.textContent = `Editing: ${heading ? heading : "(No heading)"}`;
          els.saveQuoteBtn.textContent = "Update";
        } else {
          els.editingState.textContent = "Creating new quote";
          els.saveQuoteBtn.textContent = "Save";
        }
      }

      function clearComposerForNewQuote() {
        els.headingInput.value = "";
        els.referenceInput.value = "";
        els.sourceText.value = "";
        els.noteEditor.innerHTML = "";
        els.searchInput.value = "";
        els.selectionToggle.checked = true;
        setEditingState(null);
        renderPreview();
        activateTab("quote");
      }

      function getSelectedText() {
        const start = els.sourceText.selectionStart;
        const end = els.sourceText.selectionEnd;
        if (
          typeof start !== "number" ||
          typeof end !== "number" ||
          start === end
        ) {
          return "";
        }
        return els.sourceText.value.slice(start, end);
      }

      function getQuoteText() {
        if (els.selectionToggle.checked) {
          return safeTrim(getSelectedText());
        }
        return safeTrim(els.sourceText.value);
      }

      function getQuoteFontFamily(isUrdu) {
        const choice = els.fontSelect.value;
        if (choice === "urdu-main") return "var(--font-urdu)";
        if (choice === "urdu-alt") return "var(--font-urdu-alt)";
        if (choice === "english-serif") return "var(--font-serif)";
        if (choice === "english-sans") return "var(--font-sans)";
        return isUrdu ? "var(--font-urdu)" : "var(--font-serif)";
      }

      function normalizeUrl(input) {
        const raw = safeTrim(input);
        if (!raw) return "";
        if (/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(raw)) return raw;
        if (raw.startsWith("//")) return `https:${raw}`;
        return `https://${raw}`;
      }

      function renderMarkdownOrText(input) {
        const text = input || "";
        if (!text) return "";
        if (window.marked && typeof window.marked.parse === "function") {
          return window.marked.parse(text, { gfm: true, breaks: true });
        }
        return escapeHtml(text).replace(/\n/g, "<br>");
      }

      function execNoteCommand(command, value = null) {
        els.noteEditor.focus();
        document.execCommand(command, false, value);
      }

      function insertNoteLink(inputUrl) {
        const raw = safeTrim(inputUrl);
        if (!raw) return;
        const href = normalizeUrl(raw);
        const html = `<a href="${escapeHtml(href)}" data-raw-url="${escapeHtml(raw)}" target="_blank" rel="noopener noreferrer">${escapeHtml(raw)}</a>`;
        execNoteCommand("insertHTML", html);
      }

      function getNoteHtml() {
        const html = els.noteEditor.innerHTML || "";
        return html.replace(/^(<br>|\s|&nbsp;)*$/i, "");
      }

      function getPublicNoteHtml() {
        const source = getNoteHtml();
        if (!source) return "";
        const temp = document.createElement("div");
        temp.innerHTML = source;

        temp.querySelectorAll("[data-private='1']").forEach((node) => {
          node.remove();
        });

        temp
          .querySelectorAll("script,style,iframe,object")
          .forEach((node) => node.remove());
        temp.querySelectorAll("*").forEach((el) => {
          [...el.attributes].forEach((attr) => {
            if (attr.name.startsWith("on")) el.removeAttribute(attr.name);
          });
        });

        return temp.innerHTML.trim();
      }

      function renderNotesPublic() {
        const publicHtml = getPublicNoteHtml();
        els.notesPublicContent.innerHTML = "";
        els.notesLinksList.innerHTML = "";

        if (!publicHtml) {
          els.notesPublicCard.classList.add("hidden");
          return;
        }

        const temp = document.createElement("div");
        temp.innerHTML = publicHtml;
        const seen = new Set();
        const links = [];

        temp.querySelectorAll("a[href]").forEach((a) => {
          const rawAttr = safeTrim(a.getAttribute("data-raw-url") || "");
          const text = safeTrim(a.textContent || "");
          let href = safeTrim(a.getAttribute("href") || "");
          if (!/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(href)) href = normalizeUrl(href);

          let raw = rawAttr || text || href;
          if (!/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(raw) && raw.includes("."))
            raw = normalizeUrl(raw);
          if (!/^[a-zA-Z][a-zA-Z\d+.-]*:/.test(raw)) raw = href;

          const key = `${href}__${raw}`;
          if (!seen.has(key)) {
            seen.add(key);
            links.push({ href, raw });
          }

          a.replaceWith(document.createTextNode(rawAttr || text || href));
        });

        els.notesPublicContent.innerHTML = temp.innerHTML;

        for (const linkInfo of links) {
          const row = document.createElement("div");
          row.className =
            "flex items-center gap-1.5 rounded-md border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-1";

          const open = document.createElement("a");
          open.href = linkInfo.href;
          open.target = "_blank";
          open.rel = "noopener noreferrer";
          open.className =
            "min-w-0 flex-1 truncate text-[10px] text-blue-700 underline";
          open.textContent = linkInfo.raw;
          open.title = linkInfo.raw;

          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className =
            "rounded border border-[var(--line)] bg-white px-1.5 py-0.5 text-[10px] text-gray-700 hover:bg-gray-50";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(linkInfo.raw);
              showStatus("Link copied.");
            } catch (error) {
              showStatus("Copy failed for this link.", true);
            }
          });

          row.append(open, copyBtn);
          els.notesLinksList.appendChild(row);
        }

        els.notesPublicCard.classList.remove("hidden");
      }

      function updateLanguageStyles() {
        const lang = els.languageSelect.value;
        const isUrdu = lang === "ur";

        els.previewInner.classList.toggle("ur", isUrdu);
        els.previewInner.classList.toggle("en", !isUrdu);
        els.previewInner.dir = isUrdu ? "rtl" : "ltr";
        els.previewInner.lang = lang;
        els.previewCard.classList.toggle("ur-quotes", isUrdu);

        els.sourceText.dir = isUrdu ? "rtl" : "ltr";
        els.headingInput.dir = isUrdu ? "rtl" : "ltr";
        els.referenceInput.dir = isUrdu ? "rtl" : "ltr";
        els.noteEditor.dir = isUrdu ? "rtl" : "ltr";
        els.searchInput.dir = "ltr";

        els.sourceText.classList.toggle("ur-input", isUrdu);
        els.headingInput.classList.toggle("ur-input", isUrdu);
        els.referenceInput.classList.toggle("ur-input", isUrdu);
        els.noteEditor.classList.toggle("ur-input", isUrdu);

        const theme = THEMES[els.themeSelect.value] || THEMES.parchment;
        const fontFamily = getQuoteFontFamily(isUrdu);
        const customText = safeTrim(els.customTextColorInput.value);
        const customBackground = safeTrim(els.customBackgroundInput.value);

        els.previewCard.style.background = customBackground || theme.cardBg;
        els.previewCard.style.borderColor = theme.borderColor;
        els.previewCard.style.setProperty("--quote-mark", theme.markColor);

        els.previewQuote.style.fontFamily = fontFamily;
        els.previewHeading.style.fontFamily = fontFamily;
        els.previewReference.style.fontFamily = fontFamily;

        const fontSize = Number(els.fontSizeInput.value) || 28;
        const lineHeight =
          Number(els.lineHeightInput.value) || (isUrdu ? 1.95 : 1.6);
        const headingSize = Number(els.headingSizeInput.value) || 20;
        const referenceSize = Number(els.referenceSizeInput.value) || 14;
        els.previewQuote.style.fontSize = `${fontSize}px`;
        els.previewQuote.style.lineHeight = String(lineHeight);
        els.previewHeading.style.fontSize = `${headingSize}px`;
        els.previewReference.style.fontSize = `${referenceSize}px`;

        const finalTextColor = customText || theme.quoteColor;
        els.previewQuote.style.color = finalTextColor;
        els.previewHeading.style.color = customText || theme.headingColor;
        els.previewReference.style.color = customText || theme.referenceColor;
      }

      function renderPreview() {
        updateLanguageStyles();

        const heading = safeTrim(els.headingInput.value);
        const quote = getQuoteText();
        const reference = safeTrim(els.referenceInput.value);

        const hasQuote = quote.length > 0;
        const hasHeading = hasQuote && heading.length > 0;
        const hasReference = hasQuote && reference.length > 0;

        if (hasHeading) {
          els.previewHeading.textContent = heading;
          els.previewHeadingWrap.classList.remove("hidden");
        } else {
          els.previewHeading.textContent = "";
          els.previewHeadingWrap.classList.add("hidden");
        }

        if (hasQuote) {
          els.previewQuote.innerHTML = renderMarkdownOrText(quote);
          els.previewQuote.classList.remove("hidden");
        } else {
          els.previewQuote.innerHTML = "";
          els.previewQuote.classList.add("hidden");
        }

        if (hasReference) {
          els.previewReference.textContent = reference;
          els.previewReference.classList.remove("hidden");
          els.quoteRefSeparator.classList.remove("hidden");
        } else {
          els.previewReference.textContent = "";
          els.previewReference.classList.add("hidden");
          els.quoteRefSeparator.classList.add("hidden");
        }

        renderNotesPublic();
      }

      function setPresentMode(on) {
        state.presentMode = on;
        document.body.classList.toggle("present", on);
        els.presentBtn.textContent = on ? "Exit" : "Present";

      function getSnapshotForSave() {
        const quote = getQuoteText();
        if (!quote) return null;
        const existing = state.editingId
          ? state.quotes.find((q) => q.id === state.editingId)
          : null;
        const id =
          existing?.id ||
          (crypto.randomUUID
            ? crypto.randomUUID()
            : `q-${Date.now()}-${Math.random().toString(16).slice(2)}`);

        return {
          id,
          heading: safeTrim(els.headingInput.value),
          quote,
          noteHtml: getNoteHtml(),
          reference: safeTrim(els.referenceInput.value),
          language: els.languageSelect.value,
          fontChoice: els.fontSelect.value,
          fontSize: Number(els.fontSizeInput.value) || 28,
          lineHeight: Number(els.lineHeightInput.value) || 1.95,
          headingSize: Number(els.headingSizeInput.value) || 20,
          referenceSize: Number(els.referenceSizeInput.value) || 14,
          theme: els.themeSelect.value,
          customTextColor: safeTrim(els.customTextColorInput.value),
          customBackground: safeTrim(els.customBackgroundInput.value),
          pinned: existing ? !!existing.pinned : false,
          createdAt: existing?.createdAt || nowIso(),
          updatedAt: nowIso(),
        };
      }

      function openDb() {
        return new Promise((resolve, reject) => {
          if (!window.indexedDB) {
            reject(new Error("IndexedDB is not supported in this browser."));
            return;
          }

          const request = indexedDB.open(DB_NAME, DB_VERSION);

          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(STORE_QUOTES)) {
              db.createObjectStore(STORE_QUOTES, { keyPath: "id" });
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () =>
            reject(request.error || new Error("Failed to open IndexedDB."));
        });
      }

      function dbTx(mode) {
        const tx = state.db.transaction(STORE_QUOTES, mode);
        return tx.objectStore(STORE_QUOTES);
      }

      function dbGetAllQuotes() {
        return new Promise((resolve, reject) => {
          const req = dbTx("readonly").getAll();
          req.onsuccess = () =>
            resolve(Array.isArray(req.result) ? req.result : []);
          req.onerror = () =>
            reject(req.error || new Error("Failed to read quotes."));
        });
      }

      function dbPutQuote(quote) {
        return new Promise((resolve, reject) => {
          const req = dbTx("readwrite").put(quote);
          req.onsuccess = () => resolve();
          req.onerror = () =>
            reject(req.error || new Error("Failed to save quote."));
        });
      }

      function dbDeleteQuote(id) {
        return new Promise((resolve, reject) => {
          const req = dbTx("readwrite").delete(id);
          req.onsuccess = () => resolve();
          req.onerror = () =>
            reject(req.error || new Error("Failed to delete quote."));
        });
      }

      function dbClearQuotes() {
        return new Promise((resolve, reject) => {
          const req = dbTx("readwrite").clear();
          req.onsuccess = () => resolve();
          req.onerror = () =>
            reject(req.error || new Error("Failed to clear quotes."));
        });
      }

      function sortQuotes(quotes) {
        return [...quotes].sort((a, b) => {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          return String(b.updatedAt || "").localeCompare(
            String(a.updatedAt || ""),
          );
        });
      }

      function shortText(value, limit = 95) {
        const clean = safeTrim(value).replace(/\s+/g, " ");
        if (clean.length <= limit) return clean;
        return `${clean.slice(0, limit)}...`;
      }

      function htmlToText(html) {
        if (!html) return "";
        const temp = document.createElement("div");
        temp.innerHTML = html;
        return safeTrim(temp.textContent || "");
      }

      function setCuratorCount() {
        const total = state.quotes.length;
        const pinned = state.quotes.filter((q) => q.pinned).length;
        els.curatorCount.textContent = `${total} quotes (${pinned} pinned)`;
      }

      function renderCuratorList() {
        setCuratorCount();
        els.curatorList.innerHTML = "";

        if (state.quotes.length === 0) {
          const empty = document.createElement("p");
          empty.className =
            "rounded-md border border-dashed border-[var(--line)] px-2 py-2 text-[10px] text-gray-500";
          empty.textContent = "No saved quotes yet.";
          els.curatorList.appendChild(empty);
          return;
        }

        for (const item of state.quotes.slice(0, 120)) {
          const row = document.createElement("div");
          row.className =
            "flex items-start gap-1.5 rounded-md border border-[var(--line)] bg-[var(--bg-panel)] px-1.5 py-1";

          const pinBtn = document.createElement("button");
          pinBtn.type = "button";
          pinBtn.className = `mt-0.5 rounded px-1 text-[11px] ${item.pinned ? "text-amber-700" : "text-gray-400 hover:text-amber-600"}`;
          pinBtn.textContent = item.pinned ? "★" : "☆";
          pinBtn.title = item.pinned ? "Unpin" : "Pin";
          pinBtn.addEventListener("click", () => togglePin(item.id));

          const loadBtn = document.createElement("button");
          loadBtn.type = "button";
          loadBtn.className = "min-w-0 flex-1 text-left";
          loadBtn.title = "Load this quote";
          loadBtn.innerHTML = `<p class="text-[10px] font-semibold text-gray-700">${item.heading ? shortText(item.heading, 42) : "(No heading)"}</p><p class="text-[10px] text-gray-600">${shortText(item.quote, 72)}</p>`;
          loadBtn.addEventListener("click", () => loadSavedQuote(item));

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className =
            "rounded px-1 text-[11px] text-gray-400 hover:text-red-600";
          delBtn.textContent = "✕";
          delBtn.title = "Delete";
          delBtn.addEventListener("click", () => deleteSavedQuote(item.id));

          row.append(pinBtn, loadBtn, delBtn);
          els.curatorList.appendChild(row);
        }
      }

      function getSearchMatches(query) {
        const q = safeTrim(query).toLowerCase();
        if (!q) return [];
        return state.quotes
          .filter((item) => {
            const hay =
              `${item.heading || ""} ${item.quote || ""} ${item.reference || ""} ${htmlToText(item.noteHtml || "")}`.toLowerCase();
            return hay.includes(q);
          })
          .slice(0, 25);
      }

      function renderDropdown(matches) {
        state.dropdownMatches = matches;
        els.curatorDropdown.innerHTML = "";

        if (matches.length === 0) {
          els.curatorDropdown.classList.add("hidden");
          return;
        }

        for (const item of matches) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className =
            "block w-full rounded px-1.5 py-1 text-left hover:bg-gray-50";
          btn.innerHTML = `<p class="text-[10px] font-semibold text-gray-700">${item.pinned ? "★ " : ""}${item.heading ? shortText(item.heading, 55) : "(No heading)"}</p><p class="text-[10px] text-gray-600">${shortText(item.quote, 85)}</p>`;
          btn.addEventListener("click", () => {
            loadSavedQuote(item);
            els.curatorDropdown.classList.add("hidden");
            els.curatorSearch.select();
          });
          els.curatorDropdown.appendChild(btn);
        }

        els.curatorDropdown.classList.remove("hidden");
      }

      async function refreshQuotes() {
        const all = await dbGetAllQuotes();
        state.quotes = sortQuotes(all);
        renderCuratorList();
        renderDropdown(getSearchMatches(els.curatorSearch.value));
      }

      function loadSavedQuote(item) {
        els.languageSelect.value = item.language === "en" ? "en" : "ur";
        els.fontSelect.value = item.fontChoice || "auto";
        els.fontSizeInput.value = String(item.fontSize || 28);
        els.lineHeightInput.value = String(item.lineHeight || 1.95);
        els.headingSizeInput.value = String(item.headingSize || 20);
        els.referenceSizeInput.value = String(item.referenceSize || 14);
        els.themeSelect.value =
          item.theme && THEMES[item.theme] ? item.theme : "parchment";
        els.customTextColorInput.value = item.customTextColor || "";
        els.customBackgroundInput.value = item.customBackground || "";

        els.headingInput.value = item.heading || "";
        els.referenceInput.value = item.reference || "";
        els.noteEditor.innerHTML = item.noteHtml || "";

        els.selectionToggle.checked = false;
        els.sourceText.value = item.quote || "";
        els.sourceText.setSelectionRange(0, 0);

        setEditingState(item.id, item.heading || "");
        renderPreview();
        activateTab("quote");
        showStatus("Loaded saved quote in edit mode.");
      }

      async function saveCurrentQuote() {
        try {
          const wasEditing = !!state.editingId;
          const snapshot = getSnapshotForSave();
          if (!snapshot) {
            showStatus("Nothing to save. Add/select a quote first.", true);
            return;
          }

          await dbPutQuote(snapshot);
          await refreshQuotes();
          setEditingState(snapshot.id, snapshot.heading || "");
          showStatus(wasEditing ? "Quote updated." : "Quote saved.");
        } catch (error) {
          showStatus(error.message || "Save failed.", true);
        }
      }

      async function togglePin(id) {
        try {
          const current = state.quotes.find((q) => q.id === id);
          if (!current) return;
          const updated = {
            ...current,
            pinned: !current.pinned,
            updatedAt: nowIso(),
          };
          await dbPutQuote(updated);
          await refreshQuotes();
          showStatus(updated.pinned ? "Quote pinned." : "Quote unpinned.");
        } catch (error) {
          showStatus(error.message || "Pin action failed.", true);
        }
      }

      async function deleteSavedQuote(id) {
        try {
          await dbDeleteQuote(id);
          if (state.editingId === id) {
            clearComposerForNewQuote();
          }
          await refreshQuotes();
          showStatus("Quote deleted.");
        } catch (error) {
          showStatus(error.message || "Delete failed.", true);
        }
      }

      function handleFileUpload(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          els.sourceText.value = String(reader.result || "");
          els.sourceText.setSelectionRange(0, 0);
          renderPreview();
          showStatus("Text loaded from file.");
        };
        reader.onerror = () => showStatus("Could not read file.", true);
        reader.readAsText(file, "utf-8");
      }

      function exportQuotes() {
        try {
          const payload = {
            format: "quoter-curator-v1",
            exportedAt: nowIso(),
            quotes: state.quotes,
          };

          const blob = new Blob([JSON.stringify(payload, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          const stamp = new Date().toISOString().replace(/[:.]/g, "-");
          link.href = url;
          link.download = `quoter-curator-${stamp}.json`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          showStatus("Export complete.");
        } catch (error) {
          showStatus(error.message || "Export failed.", true);
        }
      }

      async function importQuotesFromFile(event) {
        try {
          const file = event.target.files && event.target.files[0];
          if (!file) return;

          const text = await file.text();
          const parsed = JSON.parse(text);
          const incoming = Array.isArray(parsed)
            ? parsed
            : Array.isArray(parsed.quotes)
              ? parsed.quotes
              : [];

          if (incoming.length === 0) {
            showStatus("Import file has no quotes.", true);
            return;
          }

          if (els.replaceOnImport.checked) {
            await dbClearQuotes();
          }

          for (const raw of incoming) {
            const quote = safeTrim(raw.quote);
            if (!quote) continue;

            const clean = {
              id:
                raw.id ||
                (crypto.randomUUID
                  ? crypto.randomUUID()
                  : `q-${Date.now()}-${Math.random().toString(16).slice(2)}`),
              heading: safeTrim(raw.heading),
              quote,
              noteHtml: typeof raw.noteHtml === "string" ? raw.noteHtml : "",
              reference: safeTrim(raw.reference),
              language: raw.language === "en" ? "en" : "ur",
              fontChoice: raw.fontChoice || "auto",
              fontSize: Number(raw.fontSize) || 28,
              lineHeight: Number(raw.lineHeight) || 1.95,
              headingSize: Number(raw.headingSize) || 20,
              referenceSize: Number(raw.referenceSize) || 14,
              theme: raw.theme && THEMES[raw.theme] ? raw.theme : "parchment",
              customTextColor: safeTrim(raw.customTextColor),
              customBackground: safeTrim(raw.customBackground),
              pinned: !!raw.pinned,
              createdAt: raw.createdAt || nowIso(),
              updatedAt: raw.updatedAt || nowIso(),
            };
            await dbPutQuote(clean);
          }

          await refreshQuotes();
          showStatus("Import complete.");
        } catch (error) {
          showStatus(error.message || "Import failed.", true);
        } finally {
          els.importFileInput.value = "";
        }
      }

      function bindEvents() {
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => activateTab(btn.dataset.tab));
        });

        els.languageSelect.addEventListener("change", renderPreview);
        els.selectionToggle.addEventListener("change", renderPreview);
        els.fontSelect.addEventListener("change", renderPreview);
        els.fontSizeInput.addEventListener("input", renderPreview);
        els.lineHeightInput.addEventListener("input", renderPreview);
        els.headingSizeInput.addEventListener("input", renderPreview);
        els.referenceSizeInput.addEventListener("input", renderPreview);
        els.themeSelect.addEventListener("change", renderPreview);
        els.customTextColorInput.addEventListener("input", renderPreview);
        els.customBackgroundInput.addEventListener("input", renderPreview);
        els.headingInput.addEventListener("input", renderPreview);
        els.referenceInput.addEventListener("input", renderPreview);
        els.noteEditor.addEventListener("input", renderPreview);

        els.sourceText.addEventListener("input", renderPreview);
        els.sourceText.addEventListener("mouseup", renderPreview);
        els.sourceText.addEventListener("keyup", renderPreview);
        els.sourceText.addEventListener("select", renderPreview);

        els.fileInput.addEventListener("change", handleFileUpload);
        els.newQuoteBtn.addEventListener("click", () => {
          clearComposerForNewQuote();
          showStatus("Ready for a new quote.");
        });
        els.saveQuoteBtn.addEventListener("click", saveCurrentQuote);

        els.noteBoldBtn.addEventListener("click", () =>
          execNoteCommand("bold"),
        );
        els.noteItalicBtn.addEventListener("click", () =>
          execNoteCommand("italic"),
        );
        els.noteLinkBtn.addEventListener("click", () => {
          const url = window.prompt("Enter URL");
          if (!url) return;
          insertNoteLink(url);
          renderPreview();
        });
        els.notePrivateBtn.addEventListener("click", () => {
          const selection = window.getSelection();
          if (
            !selection ||
            selection.rangeCount === 0 ||
            selection.isCollapsed
          ) {
            showStatus("Select note text first, then click Private.", true);
            return;
          }
          const span = document.createElement("span");
          span.setAttribute("data-private", "1");
          span.className = "private-chip";
          try {
            const range = selection.getRangeAt(0);
            range.surroundContents(span);
            selection.removeAllRanges();
            renderPreview();
            showStatus("Marked selected note text as private.");
          } catch (error) {
            showStatus(
              "Could not mark this selection. Try a simpler selection.",
              true,
            );
          }
        });
        els.noteClearBtn.addEventListener("click", () => {
          els.noteEditor.innerHTML = "";
          renderPreview();
        });

        els.exportBtn.addEventListener("click", exportQuotes);
        els.importBtn.addEventListener("click", () =>
          els.importFileInput.click(),
        );
        els.importFileInput.addEventListener("change", importQuotesFromFile);

        els.curatorSearch.addEventListener("input", () => {
          renderDropdown(getSearchMatches(els.curatorSearch.value));
        });

        els.curatorSearch.addEventListener("focus", () => {
          renderDropdown(getSearchMatches(els.curatorSearch.value));
        });

        document.addEventListener("click", (event) => {
          if (
            !els.curatorDropdown.contains(event.target) &&
            event.target !== els.curatorSearch
          ) {
            els.curatorDropdown.classList.add("hidden");
          }
        });

        els.presentBtn.addEventListener("click", () =>
          setPresentMode(!state.presentMode),
        );
        els.presentExitBtn.addEventListener("click", () =>
          setPresentMode(false),
        );

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && state.presentMode) {
            setPresentMode(false);
          }

          if (
            (event.ctrlKey || event.metaKey) &&
            event.key.toLowerCase() === "s"
          ) {
            event.preventDefault();
            saveCurrentQuote();
          }
        });
      }

      async function init() {
        try {
          state.db = await openDb();
          bindEvents();
          setEditingState(null);
          activateTab("quote");
          renderPreview();
          setPresentMode(false);
          await refreshQuotes();
          showStatus("Ready.");
        } catch (error) {
          bindEvents();
          setEditingState(null);
          activateTab("quote");
          renderPreview();
          setPresentMode(false);
          showStatus(error.message || "Startup failed.", true);
        }
      }

      init();
    </script>
  </body>
</html>
