<!doctype html>
<html lang="ur">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urdu Book Editor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-width: 420px;
        --page-height: 595px;
        --page-margin: 20px;
        --page-border: 1px solid #e5e7eb;
        --page-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --font-family:
          "Payami Nastaleeq", "Mehr Nastaliq", "Amiri", "Noto Nastaliq Urdu",
          "Nafees", "Jameel Noori Nastaleeq", "Arial Unicode MS", sans-serif;
      }

      body {
        font-family: var(--font-family);
        background-color: #f3f4f6;
        margin: 0;
        padding: 20px;
        direction: rtl;
        text-align: right;
      }

      .editor-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .toolbar {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .toolbar select,
      .toolbar input,
      .toolbar button {
        padding: 5px 10px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 14px;
      }

      .toolbar button {
        background: #f9fafb;
        cursor: pointer;
      }

      .toolbar button.active {
        background: #e5e7eb;
        font-weight: bold;
      }

      .config-panel {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .config-panel h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }

      .config-row {
        display: flex;
        gap: 15px;
        margin-bottom: 10px;
        align-items: center;
      }

      .config-row input,
      .config-row select {
        flex: 1;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
      }

      .book-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .page {
        width: var(--page-width);
        height: var(--page-height);
        background: white;
        border: var(--page-border);
        box-shadow: var(--page-shadow);
        padding: var(--page-margin);
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
      }

      .page-header,
      .page-footer {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 10px;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 5px;
        display: flex;
        justify-content: space-between;
      }

      .page-content {
        height: calc(100% - 60px);
        overflow-y: auto;
        padding: 10px;
        border: 1px dashed #e5e7eb;
        border-radius: 4px;
      }

      .page-content[contenteditable="true"] {
        outline: none;
      }

      .page-number {
        text-align: center;
        font-size: 10px;
        color: #9ca3af;
        margin-top: 5px;
      }

      .nav-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        align-items: center;
      }

      .nav-container button {
        padding: 8px 16px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .nav-container input {
        width: 60px;
        text-align: center;
      }

      .hidden {
        display: none !important;
      }

      .page-break {
        border-top: 2px dashed #9ca3af;
        margin: 20px 0;
        padding-top: 10px;
        color: #6b7280;
        font-size: 12px;
        text-align: center;
      }

      /* RTL/LTR Toggle Styles */
      .direction-toggle {
        display: flex;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        overflow: hidden;
      }

      .direction-toggle button {
        padding: 5px 10px;
        background: #f9fafb;
        border: none;
        cursor: pointer;
      }

      .direction-toggle button.active {
        background: #e5e7eb;
        font-weight: bold;
      }

      /* Print Styles */
      @media print {
        body {
          background: white;
          padding: 0;
        }
        .toolbar,
        .config-panel,
        .nav-container {
          display: none !important;
        }
        .book-container {
          gap: 0;
        }
        .page {
          box-shadow: none;
          border: 1px solid #000;
        }
        .page-header,
        .page-footer {
          border-bottom: 1px solid #000;
        }
      }
    </style>
      <script defer src="../assets/js/shared-init.js"></script>
</head>
  <body>
    <div class="editor-container">
      <!-- Toolbar -->
      <div class="toolbar">
        <select id="fontFamily">
          <option value="Mehr Nastaliq">Mehr Nastaliq</option>
          <option value="Amiri">Amiri</option>
          <option value="Noto Nastaliq Urdu">Noto Nastaliq Urdu</option>
          <option value="Arial Unicode MS">Arial Unicode MS</option>
        </select>
        <select id="fontSize">
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
          <option value="22">22px</option>
        </select>

        <button
          onclick="document.execCommand('bold', false, null)"
          title="Bold"
        >
          B
        </button>
        <button
          onclick="document.execCommand('italic', false, null)"
          title="Italic"
        >
          I
        </button>
        <button
          onclick="document.execCommand('underline', false, null)"
          title="Underline"
        >
          U
        </button>

        <button
          onclick="document.execCommand('superscript', false, null)"
          title="Superscript"
        >
          x²
        </button>
        <button
          onclick="document.execCommand('subscript', false, null)"
          title="Subscript"
        >
          x₂
        </button>

        <div class="direction-toggle">
          <button id="btn-rtl" class="active" onclick="setDirection('rtl')">
            RTL
          </button>
          <button id="btn-ltr" onclick="setDirection('ltr')">LTR</button>
        </div>

        <button
          onclick="document.execCommand('justifyRight', false, null)"
          title="Right Align"
        >
          →
        </button>
        <button
          onclick="document.execCommand('justifyLeft', false, null)"
          title="Left Align"
        >
          ←
        </button>
        <button
          onclick="document.execCommand('justifyCenter', false, null)"
          title="Center Align"
        >
          ↔
        </button>

        <button
          onclick="document.execCommand('insertUnorderedList', false, null)"
          title="Bulleted List"
        >
          •
        </button>
        <button
          onclick="document.execCommand('insertOrderedList', false, null)"
          title="Numbered List"
        >
          1.
        </button>

        <input
          type="color"
          id="fontColor"
          onchange="document.execCommand('foreColor', false, this.value)"
        />

        <button onclick="insertPageBreak()" title="Insert Page Break">
          Page Break
        </button>
      </div>

      <!-- Configuration Panel -->
      <div class="config-panel">
        <h3>Book Configuration</h3>
        <div class="config-row">
          <input
            type="text"
            id="novelTitle"
            placeholder="Novel Title (replaces <title> token)"
          />
          <select id="pageSize">
            <option value="A5">A5 (Default)</option>
            <option value="A4">A4</option>
            <option value="Custom">Custom</option>
          </select>
          <input
            type="number"
            id="pageMargin"
            placeholder="Page Margin (px)"
            value="20"
          />
        </div>
        <div class="config-row">
          <input
            type="text"
            id="headerTemplate"
            placeholder="Header Template (e.g., <title> | <chapter> | <page-number>)"
          />
          <input
            type="text"
            id="footerTemplate"
            placeholder="Footer Template"
          />
        </div>
        <div class="config-row">
          <input type="text" id="fontName" placeholder="Custom Font Name" />
          <input
            type="url"
            id="fontUrl"
            placeholder="Custom Font URL (.woff/.woff2)"
          />
          <button onclick="addCustomFont()">Add Font</button>
        </div>
      </div>

      <!-- Book Pages -->
      <div class="book-container" id="bookContainer">
        <!-- Pages will be injected here -->
      </div>

      <!-- Navigation -->
      <div class="nav-container">
        <button onclick="prevPage()">◀ Previous</button>
        <input type="number" id="pageInput" min="1" value="1" />
        <span>of <span id="totalPages">1</span></span>
        <button onclick="nextPage()">Next ▶</button>
        <button onclick="exportHTML()">Export HTML</button>
        <button onclick="window.print()">Print</button>
      </div>
    </div>

    <script>
      // State Management
      const state = {
        title: "",
        headerTemplate: "<title> | <chapter> | <page-number>",
        footerTemplate: "<page-number>",
        fontFamily: `Payami Nastaleeq, Mehr Nastaliq, Amiri, Noto Nastaliq Urdu, Nafees, Jameel Noori Nastaleeq, Arial Unicode MS, sans-serif`,
        fontSize: "16px",
        direction: "rtl",
        pages: [],
        currentPage: 1,
        totalPages: 1,
        pageSize: "A5",
        pageMargin: 20,
        buffer: "<h1>Chapter 1</h1><p>Write your story here...</p>",
        customFonts: [],
      };

      // DOM Elements
      const bookContainer = document.getElementById("bookContainer");
      const pageInput = document.getElementById("pageInput");
      const totalPagesSpan = document.getElementById("totalPages");
      const novelTitleInput = document.getElementById("novelTitle");
      const headerTemplateInput = document.getElementById("headerTemplate");
      const footerTemplateInput = document.getElementById("footerTemplate");
      const fontFamilySelect = document.getElementById("fontFamily");
      const fontSizeSelect = document.getElementById("fontSize");
      const pageMarginInput = document.getElementById("pageMargin");
      const pageSizeSelect = document.getElementById("pageSize");

      // Initialization
      document.addEventListener("DOMContentLoaded", () => {
        loadState();
        setupEventListeners();
        setupFonts();
        render();
      });

      function setupEventListeners() {
        // Inputs
        novelTitleInput.addEventListener("input", (e) => {
          state.title = e.target.value;
          updateHeaderFooter();
        });
        headerTemplateInput.addEventListener("input", (e) => {
          state.headerTemplate = e.target.value;
          updateHeaderFooter();
        });
        footerTemplateInput.addEventListener("input", (e) => {
          state.footerTemplate = e.target.value;
          updateHeaderFooter();
        });
        fontFamilySelect.addEventListener("change", (e) => {
          state.fontFamily = e.target.value;
          applyStyles();
        });
        fontSizeSelect.addEventListener("change", (e) => {
          state.fontSize = e.target.value + "px";
          applyStyles();
        });
        pageMarginInput.addEventListener("input", (e) => {
          state.pageMargin = parseInt(e.target.value);
          applyStyles();
        });
        pageSizeSelect.addEventListener("change", (e) => {
          state.pageSize = e.target.value;
          applyStyles();
        });

        // Navigation
        pageInput.addEventListener("change", (e) => {
          const page = parseInt(e.target.value);
          if (page >= 1 && page <= state.totalPages) {
            state.currentPage = page;
            render();
          } else {
            e.target.value = state.currentPage;
          }
        });
      }

      function setupFonts() {
        // Load Mehr Nastaliq
        const link = document.createElement("link");
        link.href =
          "https://cdn.jsdelivr.net/gh/shakesvision/MehrNastaleeq/MehrNastaliqWeb.css";
        link.rel = "stylesheet";
        document.head.appendChild(link);
      }

      function addCustomFont() {
        const name = document.getElementById("fontName").value;
        const url = document.getElementById("fontUrl").value;
        if (!name || !url) return;

        const style = document.createElement("style");
        style.textContent = `
                @font-face {
                    font-family: '${name}';
                    src: url('${url}') format('woff2'), url('${url}') format('woff');
                }
            `;
        document.head.appendChild(style);

        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        fontFamilySelect.appendChild(option);

        state.customFonts.push({ name, url });
        saveState();
      }

      function setDirection(dir) {
        state.direction = dir;
        document.body.dir = dir;
        document.body.style.textAlign = dir === "rtl" ? "right" : "left";
        document.querySelectorAll(".page-content").forEach((el) => {
          el.dir = dir;
          el.style.textAlign = dir === "rtl" ? "right" : "left";
        });
        document
          .getElementById("btn-rtl")
          .classList.toggle("active", dir === "rtl");
        document
          .getElementById("btn-ltr")
          .classList.toggle("active", dir === "ltr");
        saveState();
      }

      function insertPageBreak() {
        const page = getCurrentPageElement();
        if (page) {
          const br = document.createElement("div");
          br.className = "page-break";
          br.contentEditable = "false";
          br.innerHTML = "Manual Page Break";
          page.querySelector(".page-content").appendChild(br);
          paginate();
        }
      }

      function getCurrentPageElement() {
        return document.querySelector(
          `.page[data-page="${state.currentPage}"]`,
        );
      }

      function applyStyles() {
        const root = document.documentElement;
        root.style.setProperty("--font-family", state.fontFamily);
        root.style.setProperty("--font-size", state.fontSize);
        root.style.setProperty("--page-margin", state.pageMargin + "px");

        // Page dimensions
        if (state.pageSize === "A4") {
          root.style.setProperty("--page-width", "595px");
          root.style.setProperty("--page-height", "842px");
        } else {
          root.style.setProperty("--page-width", "420px");
          root.style.setProperty("--page-height", "595px");
        }

        document.querySelectorAll(".page-content").forEach((el) => {
          el.style.fontSize = state.fontSize;
          el.style.fontFamily = state.fontFamily;
        });
        saveState();
      }

      function render() {
        // Clear container
        bookContainer.innerHTML = "";

        // Determine layout
        const isLargeScreen = window.innerWidth >= 1024;
        const pagesToShow = isLargeScreen ? 2 : 1;

        // Render pages
        for (let i = 0; i < pagesToShow; i++) {
          const pageNum = state.currentPage + i;
          if (pageNum <= state.totalPages) {
            const page = createPageElement(pageNum);
            bookContainer.appendChild(page);
          }
        }

        // Update UI
        pageInput.value = state.currentPage;
        totalPagesSpan.textContent = state.totalPages;
        updateHeaderFooter();
      }

      function createPageElement(pageNum) {
        const page = document.createElement("div");
        page.className = "page";
        page.dataset.page = pageNum;

        // Header
        const header = document.createElement("div");
        header.className = "page-header";
        header.innerHTML = renderTemplate(state.headerTemplate, pageNum);

        // Content
        const content = document.createElement("div");
        content.className = "page-content";
        content.contentEditable = "true";
        content.dir = state.direction;
        content.style.textAlign = state.direction === "rtl" ? "right" : "left";
        content.style.fontSize = state.fontSize;
        content.style.fontFamily = state.fontFamily;

        // Inject page content
        const pageContent = state.pages[pageNum - 1] || "";
        content.innerHTML = pageContent;

        // Footer
        const footer = document.createElement("div");
        footer.className = "page-footer";
        footer.innerHTML = renderTemplate(state.footerTemplate, pageNum);

        // Page Number
        const pageNumber = document.createElement("div");
        pageNumber.className = "page-number";
        pageNumber.textContent = `صفحہ ${pageNum}`;

        page.appendChild(header);
        page.appendChild(content);
        page.appendChild(footer);
        page.appendChild(pageNumber);

        return page;
      }

      function renderTemplate(template, pageNum) {
        let html = template;
        const chapter = getChapterForPage(pageNum);

        html = html.replace(/<title>/g, state.title || "Untitled");
        html = html.replace(/<chapter>/g, chapter || "...");
        html = html.replace(/<page-number>/g, pageNum.toString());

        // Parse pipes for columns
        if (html.includes("|")) {
          const parts = html.split("|").map((p) => p.trim());
          if (parts.length === 2) {
            html = `<div class="flex justify-between"><span>${parts[0]}</span><span>${parts[1]}</span></div>`;
          } else if (parts.length === 3) {
            html = `<div class="flex justify-between"><span>${parts[0]}</span><span>${parts[1]}</span><span>${parts[2]}</span></div>`;
          }
        }

        return html;
      }

      function getChapterForPage(pageNum) {
        // Scan backwards from page start to find last H1
        let chapter = "";
        let found = false;

        // Simple heuristic: look in previous pages for H1
        for (let i = pageNum - 1; i >= 0; i--) {
          const content = state.pages[i] || "";
          const match = content.match(/<h1[^>]*>([^<]+)<\/h1>/i);
          if (match) {
            chapter = match[1];
            found = true;
            break;
          }
        }

        return found ? chapter : "";
      }

      function updateHeaderFooter() {
        document.querySelectorAll(".page-header").forEach((el, i) => {
          const pageNum = parseInt(el.closest(".page").dataset.page);
          el.innerHTML = renderTemplate(state.headerTemplate, pageNum);
        });
        document.querySelectorAll(".page-footer").forEach((el, i) => {
          const pageNum = parseInt(el.closest(".page").dataset.page);
          el.innerHTML = renderTemplate(state.footerTemplate, pageNum);
        });
      }

      function paginate() {
        // Proper pagination engine that measures content height
        const parser = new DOMParser();
        const doc = parser.parseFromString(state.buffer, "text/html");
        const body = doc.body;

        // Create a temporary container to measure content
        const tempContainer = document.createElement("div");
        tempContainer.style.fontFamily = state.fontFamily;
        tempContainer.style.fontSize = state.fontSize;
        tempContainer.style.width = getComputedStyle(
          document.documentElement,
        ).getPropertyValue("--page-width");
        tempContainer.style.padding = getComputedStyle(
          document.documentElement,
        ).getPropertyValue("--page-margin");
        tempContainer.style.boxSizing = "border-box";
        tempContainer.style.position = "absolute";
        tempContainer.style.visibility = "hidden";
        tempContainer.style.height = "auto";
        tempContainer.style.overflow = "visible";
        document.body.appendChild(tempContainer);

        // Calculate available content height
        const pageHeight = parseInt(
          getComputedStyle(document.documentElement).getPropertyValue(
            "--page-height",
          ),
        );
        const margin =
          parseInt(
            getComputedStyle(document.documentElement).getPropertyValue(
              "--page-margin",
            ),
          ) * 2;
        const headerFooterHeight = 60; // Approximate header + footer height
        const availableHeight = pageHeight - margin - headerFooterHeight;

        const sections = [];
        let currentPageContent = "";
        let currentHeight = 0;

        // Process each node
        Array.from(body.childNodes).forEach((node) => {
          if (node.nodeType === 3) {
            // Text node
            const textNode = document.createElement("span");
            textNode.textContent = node.textContent;
            tempContainer.appendChild(textNode);

            const nodeHeight = textNode.offsetHeight;

            if (
              currentHeight + nodeHeight > availableHeight &&
              currentPageContent
            ) {
              // Start new page
              sections.push(currentPageContent);
              currentPageContent = node.textContent;
              currentHeight = nodeHeight;

              // Clear and reset temp container
              tempContainer.innerHTML = "";
              tempContainer.appendChild(textNode);
            } else {
              currentPageContent += node.textContent;
              currentHeight += nodeHeight;
            }

            textNode.remove();
          } else if (
            node.tagName === "PAGE-BREAK" ||
            node.outerHTML.includes("page-break")
          ) {
            // Manual page break
            if (currentPageContent) {
              sections.push(currentPageContent);
              currentPageContent = "";
              currentHeight = 0;
              tempContainer.innerHTML = "";
            }
          } else {
            // Element node
            const clone = node.cloneNode(true);
            tempContainer.appendChild(clone);

            const elementHeight = clone.offsetHeight;

            if (
              currentHeight + elementHeight > availableHeight &&
              currentPageContent
            ) {
              // Start new page
              sections.push(currentPageContent);
              currentPageContent = node.outerHTML;
              currentHeight = elementHeight;

              // Clear and reset temp container
              tempContainer.innerHTML = "";
              tempContainer.appendChild(clone);
            } else {
              currentPageContent += node.outerHTML;
              currentHeight += elementHeight;
            }

            clone.remove();
          }
        });

        if (currentPageContent) {
          sections.push(currentPageContent);
        }

        // Clean up
        tempContainer.remove();

        state.pages = sections;
        state.totalPages = sections.length || 1;
        state.currentPage = Math.min(state.currentPage, state.totalPages);

        render();
      }

      function prevPage() {
        if (state.currentPage > 1) {
          state.currentPage--;
          render();
        }
      }

      function nextPage() {
        if (state.currentPage < state.totalPages) {
          state.currentPage++;
          render();
        }
      }

      function saveState() {
        localStorage.setItem("urdu-editor-state", JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem("urdu-editor-state");
        if (saved) {
          const data = JSON.parse(saved);
          Object.assign(state, data);

          // Restore inputs
          novelTitleInput.value = state.title;
          headerTemplateInput.value = state.headerTemplate;
          footerTemplateInput.value = state.footerTemplate;
          fontFamilySelect.value = state.fontFamily;
          fontSizeSelect.value = parseInt(state.fontSize);
          pageMarginInput.value = state.pageMargin;
          pageSizeSelect.value = state.pageSize;

          // Restore direction
          setDirection(state.direction);
        }
      }

      // Auto-save and debounce pagination
      let saveTimer;
      document.addEventListener("input", () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          // Update buffer from visible pages
          const pages = document.querySelectorAll(".page-content");
          let buffer = "";
          pages.forEach((page) => {
            buffer += page.innerHTML;
          });
          state.buffer = buffer;
          paginate();
          saveState();
        }, 1000);
      });
    </script>
  </body>
</html>
