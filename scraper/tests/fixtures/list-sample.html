<!doctype html>
<!-- Synthetic repeating-list + pager fixture for selector/pagination tests. -->
<html lang="en">
<head><meta charset="utf-8"><title>Sample list</title></head>
<body>
  <ul class="feed">
    <li class="item"><a class="title" href="/p/1">First post</a><span class="meta">10 pts</span></li>
    <li class="item"><a class="title" href="/p/2">Second post</a><span class="meta">22 pts</span></li>
    <li class="item"><a class="title" href="/p/3">Third post</a><span class="meta">5 pts</span></li>
    <li class="item"><a class="title" href="/p/4">Fourth post</a><span class="meta">41 pts</span></li>
  </ul>
  <nav class="pagination">
    <a href="/list?page=1">1</a>
    <a class="next" rel="next" href="/list?page=2">Next ›</a>
  </nav>
</body>
</html>
