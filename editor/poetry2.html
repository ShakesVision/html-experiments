<!doctype html>
<html lang="ur" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>شاعری فارمیٹر</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/shakeeb-justify@1.0.9/dist/shakeeb-justify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </head>

  <body
    class="bg-gradient-to-br from-rose-50 via-pink-50 to-purple-50 min-h-screen"
  >
    <div class="max-w-7xl mx-auto p-4 md:p-6">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-5">
          <div class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4">
            <textarea
              id="inputText"
              rows="6"
              class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none text-lg text-right bg-white/60"
              placeholder="ہر مصرع الگ لائن میں لکھیں..."
            ></textarea>
          </div>

          <div class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4">
            <div class="flex flex-wrap gap-2 justify-center">
              <button onclick="setPattern('sher')" class="chip">
                <span class="material-symbols-outlined"
                  >format_align_center</span
                >
                شعر
              </button>

              <button onclick="setPattern('sher2')" class="chip">
                دو کالم شعر
              </button>
              <button onclick="setPattern('mukhammas')" class="chip">
                مخمس
              </button>
              <button onclick="setPattern('mukhammas-3-2')" class="chip">
                ۳+۲
              </button>
              <button onclick="setPattern('mukhammas-mixed')" class="chip">
                ۴+۱
              </button>
              <button onclick="setPattern('musaddas')" class="chip">
                مسدس
              </button>
              <button onclick="setPattern('musaddas-6')" class="chip">
                ۶ مصرعے
              </button>
              <button onclick="setPattern('musaddas-mixed')" class="chip">
                ۴+۲
              </button>
            </div>
          </div>

          <div
            class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4 flex gap-2"
          >
            <input
              id="customPattern"
              placeholder="جیسے ۴ یا ۳+۲"
              class="flex-1 border border-gray-200 p-2 rounded-lg focus:ring-2 focus:ring-purple-300 outline-none text-right"
            />
            <button
              onclick="applyCustomPattern()"
              class="icon-btn bg-purple-500"
            >
              <span class="material-symbols-outlined">auto_fix_high</span>
            </button>
          </div>

          <div
            class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4 space-y-3"
          >
            <div class="flex gap-2">
              <input
                id="bgInput"
                placeholder="پس منظر"
                class="flex-1 border border-gray-200 p-2 rounded-lg text-right"
              />
              <input
                id="colorInput"
                placeholder="متن رنگ"
                class="w-32 border border-gray-200 p-2 rounded-lg text-right"
              />
              <button onclick="applyStyles()" class="icon-btn bg-indigo-500">
                <span class="material-symbols-outlined">palette</span>
              </button>
            </div>

            <div class="flex gap-2 flex-wrap">
              <select id="fontSelector" class="border p-2 rounded-lg">
                <option value="Mehr">مہر نستعلیق</option>
                <option value="Payami">پیامی نستعلیق</option>
                <option value="Emaad">عماد نستعلیق</option>
              </select>

              <input
                id="fontUrlInput"
                placeholder="فونٹ کا لنک"
                class="flex-1 border p-2 rounded-lg text-right"
              />

              <button onclick="loadCustomFont()" class="icon-btn bg-pink-500">
                <span class="material-symbols-outlined">font_download</span>
              </button>
            </div>
          </div>

          <div
            class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4 space-y-3"
          >
            <div class="flex gap-2">
              <input
                id="poetryTitle"
                placeholder="اس آئٹم کا نام"
                class="flex-1 border border-gray-200 p-2 rounded-lg focus:ring-2 focus:ring-pink-300 outline-none text-right"
              />
              <button
                onclick="createNewPoetryItem()"
                class="icon-btn bg-sky-500"
              >
                <span class="material-symbols-outlined">note_add</span>
              </button>
              <button
                onclick="savePoetryItem()"
                class="icon-btn bg-emerald-500"
              >
                <span class="material-symbols-outlined">save</span>
              </button>
              <button onclick="deletePoetryItem()" class="icon-btn bg-rose-500">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>

            <div
              id="savedPoetryList"
              class="space-y-2 max-h-72 overflow-y-auto rounded-xl bg-white/60 p-2"
            ></div>
          </div>

          <div
            class="bg-white/70 backdrop-blur rounded-2xl shadow-md p-4 flex justify-center gap-3"
          >
            <button onclick="downloadImage()" class="icon-btn bg-green-500">
              <span class="material-symbols-outlined">download</span>
            </button>

            <button onclick="window.print()" class="icon-btn bg-gray-700">
              <span class="material-symbols-outlined">print</span>
            </button>
          </div>
        </div>

        <div class="flex items-start justify-center">
          <div
            id="print-area"
            class="w-full bg-white/80 backdrop-blur rounded-3xl shadow-xl px-10 py-12 text-center text-xl leading-loose min-h-[300px] transition-all"
          ></div>
        </div>
      </div>
    </div>

    <style>
      body {
        direction: rtl;
      }

      .chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #fdf2f8;
        color: #9d174d;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
      }

      .chip:hover {
        background: #fbcfe8;
      }

      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      .icon-btn:hover {
        opacity: 0.9;
      }

      .material-symbols-outlined {
        font-size: 20px;
      }

      .saved-item {
        width: 100%;
        text-align: right;
        padding: 12px;
        border-radius: 14px;
        background: white;
        border: 1px solid #f3e8ff;
        transition: 0.2s;
      }

      .saved-item:hover {
        border-color: #f9a8d4;
        transform: translateY(-1px);
      }

      .saved-item.active {
        background: linear-gradient(135deg, #fdf2f8, #eef2ff);
        border-color: #ec4899;
        box-shadow: 0 8px 24px rgba(236, 72, 153, 0.12);
      }

      @font-face {
        font-family: "Mehr";
        src: url("https://cdn.jsdelivr.net/gh/ShakesVision/MehrNastaleeq@master/MehrNastaliqWeb.woff")
          format("woff");
      }

      @font-face {
        font-family: "Payami";
        src: url("https://cdn.jsdelivr.net/gh/ShakesVision/PayamiTest@master/Payami%20Nastaleeq_Fixed.woff2")
          format("woff2");
      }

      @font-face {
        font-family: "Emaad";
        src: url("https://cdn.jsdelivr.net/gh/ShakesVision/EmaadNastaleeq@master/urduemadnastaleeqregular1.woff")
          format("woff");
      }

      @font-face {
        font-family: "Nafees";
        src: url("https://cdn.jsdelivr.net/gh/ShakesVision/SaadNastaleeq@master/NafeesNastaleeqv102.woff")
          format("woff");
      }

      #print-area {
        font-family: "Mehr", serif;
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const STORAGE_KEY = "poetryStudioItemsV1";
        const ACTIVE_ITEM_KEY = "poetryStudioActiveItemV1";
        let currentFont = "Mehr";
        let currentPattern = "sher";
        let savedItems = [];
        let activeItemId = null;

        const inputEl = document.getElementById("inputText");
        const previewEl = document.getElementById("print-area");
        const fontSelector = document.getElementById("fontSelector");
        const titleEl = document.getElementById("poetryTitle");
        const bgEl = document.getElementById("bgInput");
        const colorEl = document.getElementById("colorInput");
        const customPatternEl = document.getElementById("customPattern");
        const fontUrlEl = document.getElementById("fontUrlInput");
        const savedListEl = document.getElementById("savedPoetryList");

        function getDefaultTitle(text) {
          const firstLine = text
            .split("\n")
            .map(function (line) {
              return line.trim();
            })
            .find(Boolean);
          return firstLine ? firstLine.slice(0, 30) : "نیا کلام";
        }

        function getStorageItems() {
          try {
            const parsed = JSON.parse(
              localStorage.getItem(STORAGE_KEY) || "[]",
            );
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function persistItems() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(savedItems));
          if (activeItemId) {
            localStorage.setItem(ACTIVE_ITEM_KEY, activeItemId);
          } else {
            localStorage.removeItem(ACTIVE_ITEM_KEY);
          }
        }

        function ensureCustomFontOption(fontName, fontLabel) {
          if (!fontSelector || !fontName) return;

          const exists = Array.from(fontSelector.options).some(
            function (option) {
              return option.value === fontName;
            },
          );
          if (exists) return;

          const option = document.createElement("option");
          option.value = fontName;
          option.textContent = fontLabel || "کسٹم فونٹ";
          fontSelector.appendChild(option);
        }

        function registerCustomFont(fontName, url, fontLabel) {
          if (!fontName || !url) return;

          if (!document.getElementById(fontName)) {
            const style = document.createElement("style");
            style.id = fontName;
            style.innerHTML =
              "@font-face { font-family: '" +
              fontName +
              "'; src: url('" +
              url +
              "'); }";
            document.head.appendChild(style);
          }

          ensureCustomFontOption(fontName, fontLabel);
        }

        function getCurrentState() {
          return {
            title: titleEl ? titleEl.value.trim() : "",
            inputText: inputEl ? inputEl.value : "",
            pattern: currentPattern,
            customPattern: customPatternEl ? customPatternEl.value : "",
            background: bgEl ? bgEl.value : "",
            color: colorEl ? colorEl.value : "",
            fontName: currentFont,
            fontUrl: fontUrlEl ? fontUrlEl.value.trim() : "",
            updatedAt: Date.now(),
          };
        }

        function renderSavedItems() {
          if (!savedListEl) return;

          savedListEl.innerHTML = "";

          if (!savedItems.length) {
            const emptyState = document.createElement("div");
            emptyState.className = "text-sm text-gray-500 text-center py-6";
            emptyState.textContent = "ابھی کوئی محفوظ شاعری موجود نہیں";
            savedListEl.appendChild(emptyState);
            return;
          }

          const sortedItems = savedItems.slice().sort(function (a, b) {
            return (b.updatedAt || 0) - (a.updatedAt || 0);
          });

          sortedItems.forEach(function (item) {
            const button = document.createElement("button");
            button.type = "button";
            button.className =
              "saved-item" + (item.id === activeItemId ? " active" : "");
            button.onclick = function () {
              window.loadPoetryItem(item.id);
            };

            const itemTitle = document.createElement("div");
            itemTitle.className = "font-semibold text-gray-800";
            itemTitle.textContent = item.title || "بغیر عنوان";

            const itemMeta = document.createElement("div");
            itemMeta.className = "text-xs text-gray-500 mt-1";
            itemMeta.textContent = new Date(
              item.updatedAt || Date.now(),
            ).toLocaleString();

            const itemPreview = document.createElement("div");
            itemPreview.className = "text-sm text-gray-600 mt-2 truncate";
            itemPreview.textContent = item.inputText || "خالی";

            button.appendChild(itemTitle);
            button.appendChild(itemMeta);
            button.appendChild(itemPreview);
            savedListEl.appendChild(button);
          });
        }

        function applyFont() {
          if (!previewEl || !inputEl) return;
          previewEl.style.fontFamily = currentFont;
          inputEl.style.fontFamily = currentFont;
        }

        function generateGhazal() {
          if (!inputEl || !previewEl) return;

          previewEl.innerHTML = "";

          const lines = inputEl.value.split("\n");
          let inPoetry = false;
          let poetryLines = [];

          function renderPoetryBlock() {
            if (poetryLines.length === 0) return;

            const wrapper = document.createElement("div");

            if (currentPattern) {
              wrapper.className = currentPattern;
            } else {
              const pattern = customPatternEl ? customPatternEl.value : "";
              wrapper.setAttribute("data-pattern", pattern);
            }

            poetryLines.forEach(function (line) {
              const div = document.createElement("div");
              div.textContent = line;
              wrapper.appendChild(div);
            });

            previewEl.appendChild(wrapper);
            poetryLines = [];
          }

          lines.forEach(function (line) {
            line = line.trim();

            if (line.toLowerCase() === "[sj]") {
              inPoetry = true;
              return;
            }

            if (line.toLowerCase() === "[/sj]") {
              inPoetry = false;
              renderPoetryBlock();
              return;
            }

            if (inPoetry) {
              if (line) poetryLines.push(line);
              return;
            }

            if (line.startsWith("## ")) {
              const el = document.createElement("h2");
              el.textContent = line.replace("## ", "");
              el.className = "text-2xl font-bold my-3";
              previewEl.appendChild(el);
            } else if (line.startsWith("# ")) {
              const el = document.createElement("h1");
              el.textContent = line.replace("# ", "");
              el.className = "text-3xl font-bold my-4";
              previewEl.appendChild(el);
            } else if (line !== "") {
              const el = document.createElement("p");
              el.textContent = line;
              el.className = "my-2";
              previewEl.appendChild(el);
            }
          });

          if (window.ShakeebJustify) {
            ShakeebJustify.apply();
          }
        }

        function upsertActiveItem() {
          const state = getCurrentState();
          const resolvedTitle = state.title || getDefaultTitle(state.inputText);

          if (titleEl && !titleEl.value.trim()) {
            titleEl.value = resolvedTitle;
          }

          if (!activeItemId) {
            activeItemId = "poetry-" + Date.now();
          }

          const payload = {
            id: activeItemId,
            title: resolvedTitle,
            inputText: state.inputText,
            pattern: state.pattern,
            customPattern: state.customPattern,
            background: state.background,
            color: state.color,
            fontName: state.fontName,
            fontUrl: state.fontUrl,
            updatedAt: state.updatedAt,
          };

          const existingIndex = savedItems.findIndex(function (item) {
            return item.id === activeItemId;
          });

          if (existingIndex >= 0) {
            savedItems[existingIndex] = payload;
          } else {
            savedItems.push(payload);
          }

          persistItems();
          renderSavedItems();
        }

        function autoSaveActiveItem() {
          upsertActiveItem();
        }

        function applyItemState(item) {
          if (!item) return;

          activeItemId = item.id;
          currentPattern = item.pattern || "sher";
          currentFont = item.fontName || "Mehr";

          if (titleEl) titleEl.value = item.title || "";
          if (inputEl) inputEl.value = item.inputText || "";
          if (customPatternEl) customPatternEl.value = item.customPattern || "";
          if (bgEl) bgEl.value = item.background || "";
          if (colorEl) colorEl.value = item.color || "";
          if (fontUrlEl) fontUrlEl.value = item.fontUrl || "";

          if (item.fontUrl && item.fontName) {
            registerCustomFont(item.fontName, item.fontUrl, "کسٹم فونٹ");
          }

          if (fontSelector) {
            ensureCustomFontOption(currentFont, "کسٹم فونٹ");
            fontSelector.value = currentFont;
          }

          applyFont();
          window.applyStyles(false);
          generateGhazal();
          persistItems();
          renderSavedItems();
        }

        if (fontSelector) {
          fontSelector.addEventListener("change", function () {
            currentFont = this.value;
            applyFont();
            autoSaveActiveItem();
          });
        }

        if (inputEl) {
          inputEl.addEventListener("input", function () {
            generateGhazal();
            autoSaveActiveItem();
          });
        }

        if (titleEl) {
          titleEl.addEventListener("input", autoSaveActiveItem);
        }

        if (customPatternEl) {
          customPatternEl.addEventListener("input", function () {
            if (!currentPattern) {
              generateGhazal();
            }
            autoSaveActiveItem();
          });
        }

        [bgEl, colorEl].forEach(function (el) {
          if (!el) return;
          el.addEventListener("input", function () {
            window.applyStyles();
          });
        });

        if (fontUrlEl) {
          fontUrlEl.addEventListener("change", autoSaveActiveItem);
        }

        window.loadCustomFont = function () {
          if (!fontUrlEl) return;

          const url = fontUrlEl.value.trim();
          if (!url) return alert("Font URL درج کریں");

          const fontName = "CustomFont_" + Date.now();
          registerCustomFont(fontName, url, "کسٹم فونٹ");

          if (fontSelector) {
            fontSelector.value = fontName;
          }

          currentFont = fontName;
          applyFont();
          autoSaveActiveItem();
        };

        window.setPattern = function (pattern) {
          currentPattern = pattern;
          generateGhazal();
          autoSaveActiveItem();
        };

        window.applyCustomPattern = function () {
          currentPattern = null;
          generateGhazal();
          autoSaveActiveItem();
        };

        window.applyStyles = function (shouldSave) {
          if (!previewEl) return;

          previewEl.style.background = bgEl && bgEl.value ? bgEl.value : "";
          previewEl.style.color = colorEl && colorEl.value ? colorEl.value : "";

          if (shouldSave !== false) {
            autoSaveActiveItem();
          }
        };

        window.downloadImage = function () {
          if (!previewEl || !window.html2canvas) return;

          html2canvas(previewEl).then(function (canvas) {
            const suggestedName =
              (titleEl && titleEl.value.trim()) ||
              getDefaultTitle(inputEl ? inputEl.value : "");
            const fileName = prompt("فائل کا نام درج کریں", suggestedName);
            if (fileName === null) return;

            const safeName = (
              fileName.trim() ||
              suggestedName ||
              "poetry"
            ).replace(/[\\/:*?"<>|]/g, "_");

            const link = document.createElement("a");
            link.download = safeName.endsWith(".png")
              ? safeName
              : safeName + ".png";
            link.href = canvas.toDataURL();
            link.click();
          });
        };

        window.savePoetryItem = function () {
          upsertActiveItem();
        };

        window.createNewPoetryItem = function () {
          activeItemId = "poetry-" + Date.now();
          currentPattern = "sher";
          currentFont = "Mehr";

          if (titleEl) titleEl.value = "";
          if (inputEl) inputEl.value = "";
          if (customPatternEl) customPatternEl.value = "";
          if (bgEl) bgEl.value = "";
          if (colorEl) colorEl.value = "";
          if (fontUrlEl) fontUrlEl.value = "";
          if (fontSelector) fontSelector.value = "Mehr";

          applyFont();
          window.applyStyles(false);
          generateGhazal();
          upsertActiveItem();
        };

        window.loadPoetryItem = function (itemId) {
          const item = savedItems.find(function (entry) {
            return entry.id === itemId;
          });
          applyItemState(item);
        };

        window.deletePoetryItem = function () {
          if (!activeItemId) return;
          if (!confirm("اس محفوظ شاعری کو حذف کرنا ہے؟")) return;

          savedItems = savedItems.filter(function (item) {
            return item.id !== activeItemId;
          });
          activeItemId = null;
          persistItems();

          if (savedItems.length) {
            applyItemState(savedItems[0]);
            return;
          }

          currentPattern = "sher";
          currentFont = "Mehr";

          if (titleEl) titleEl.value = "";
          if (inputEl) inputEl.value = "";
          if (customPatternEl) customPatternEl.value = "";
          if (bgEl) bgEl.value = "";
          if (colorEl) colorEl.value = "";
          if (fontUrlEl) fontUrlEl.value = "";
          if (fontSelector) fontSelector.value = "Mehr";

          applyFont();
          window.applyStyles(false);
          generateGhazal();
          renderSavedItems();
        };

        function initializeFromStorage() {
          savedItems = getStorageItems();

          if (!savedItems.length) {
            window.createNewPoetryItem();
            return;
          }

          const storedActiveId = localStorage.getItem(ACTIVE_ITEM_KEY);
          const initialItem =
            savedItems.find(function (item) {
              return item.id === storedActiveId;
            }) || savedItems[0];

          applyItemState(initialItem);
        }

        initializeFromStorage();
      });
    </script>
  </body>
</html>
