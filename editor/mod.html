<!doctype html>
<html lang="ur" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>زنبیل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      /* @font-face {
            font-family: 'Payami Nastaleeq';
            src: url('https://usamasarsari.com/fonts/Jameel-Noori-Nastaleeq-Regular.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Mehr';
            src: url('https://usamasarsari.com/fonts/Mehr-Nastaliq.ttf') format('truetype');
        }

        @font-face {
            font-family: 'AlQalam';
            src: url('https://usamasarsari.com/fonts/al-qalam-web.ttf') format('truetype');
        } */

      body {
        font-family: "Payami Nastaleeq", serif;
        background-color: #f8fafc;
      }

      .font-jameel {
        font-family: "Payami Nastaleeq", serif;
      }

      .font-mehr {
        font-family: "Mehr", serif;
      }

      .font-alqalam {
        font-family: "AlQalam", serif;
      }

      .justify-line {
        text-align: justify;
        text-align-last: justify;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #e2e8f0;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #3b82f6;
        border-radius: 4px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .dragging {
        opacity: 0.5;
        transform: scale(0.98);
        border: 2px dashed #3b82f6;
      }

      .draggable-item {
        cursor: grab;
      }

      .draggable-item:active {
        cursor: grabbing;
      }

      .emoji-border span {
        display: inline-block;
      }
    </style>
  </head>

  <body class="flex flex-col min-h-screen select-none text-gray-800">
    <header
      class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40 print:hidden"
    >
      <div class="container mx-auto flex justify-between items-center relative">
        <h1
          class="text-2xl font-bold cursor-pointer hover:text-blue-300 transition flex items-center gap-3"
          onclick="goToDashboard()"
        >
          <i id="backIcon" class="fas fa-arrow-right hidden text-xl"></i>
          <span id="headerTitle">زنبیل</span>
        </h1>
        <div id="authContainer">
          <button
            id="loginBtn"
            class="bg-white text-slate-900 px-4 py-1.5 rounded shadow text-sm font-bold hover:bg-gray-100"
          >
            لاگ ان
          </button>
          <div id="menuContainer" class="hidden relative">
            <a
              href="https://youtu.be/WTh-VRT8kxM"
              target="_blank"
              class="text-2xl hover:text-red-400 focus:outline-none transition px-2"
              title="ویڈیو گائیڈ"
            >
              <i class="fab fa-youtube"></i>
            </a>
            <button
              onclick="openToolsModal()"
              class="text-2xl hover:text-blue-200 focus:outline-none transition"
              title="تصنیف ٹولز"
            >
              <i class="fas fa-toolbox"></i>
            </button>
            <button
              onclick="toggleMenu()"
              class="text-2xl hover:text-blue-300 focus:outline-none px-2"
            >
              <i class="fas fa-bars"></i>
            </button>
          </div>
        </div>
      </div>
    </header>
    <main
      class="flex-grow container mx-auto p-4 w-full max-w-4xl relative print:hidden"
    >
      <div id="loginMessage" class="text-center mt-20 hidden">
        <div class="text-6xl text-gray-300 mb-4">
          <i class="fas fa-lock"></i>
        </div>
        <p class="text-2xl text-gray-500">براہ کرم لاگ ان کریں۔</p>
        <hr class="my-6 border-gray-300" />
        <iframe
          src="https://usamasarsari.com/tools/zambeel/introduction.html"
          class="w-full h-96 border-0"
        ></iframe>
      </div>
      <div id="dashboard" class="w-full hidden flex flex-col gap-6">
        <div class="relative w-full group">
          <input
            type="text"
            id="globalSearchInput"
            placeholder="تمام کتب میں تلاش کریں..."
            class="w-full border-2 border-gray-200 p-3 rounded-xl shadow-sm focus:border-blue-500 outline-none pr-12 transition bg-white"
          />
          <button
            onclick="performGlobalSearch()"
            class="absolute left-2 top-2 text-gray-400 hover:text-blue-600 p-2 rounded-full transition z-10"
          >
            <i class="fas fa-search text-xl"></i>
          </button>
        </div>
        <div
          id="searchResults"
          class="hidden bg-white p-4 rounded-xl shadow-lg border border-yellow-100 z-50 relative"
        >
          <div class="flex justify-between items-center border-b pb-2 mb-2">
            <h3 class="font-bold text-gray-700">تلاش کے نتائج</h3>
            <button
              onclick="clearSearch()"
              class="text-red-500 hover:bg-red-50 px-2 rounded"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div
            id="searchResultsList"
            class="flex flex-col gap-2 max-h-60 overflow-y-auto custom-scrollbar"
          ></div>
        </div>
        <button
          onclick="showCreateBookModal()"
          class="bg-blue-600 text-white text-xl py-3 rounded-xl shadow-lg hover:bg-blue-700 transition flex justify-center items-center gap-2 transform active:scale-95"
        >
          <i class="fas fa-plus"></i> نئی کتاب بنائیں
        </button>
        <div
          id="booksContainer"
          class="grid grid-cols-2 md:grid-cols-3 gap-4"
        ></div>
      </div>
      <div id="bookView" class="w-full hidden flex flex-col gap-4">
        <div class="flex gap-0.5 justify-center flex-wrap items-center px-0">
          <button
            onclick="copyTableOfContents(this)"
            class="bg-gray-50 text-gray-700 px-0.5 py-0.5 rounded text-[10px] hover:bg-gray-200 border transition flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="fas fa-list"></i> فہرست
          </button>
          <button
            onclick="copyFullBook(this)"
            class="bg-gray-50 text-gray-700 px-0.5 py-0.5 rounded text-[10px] hover:bg-gray-200 border transition flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="far fa-copy"></i> Copy
          </button>
          <button
            onclick="downloadBookText(this)"
            class="bg-gray-50 text-gray-700 px-0.5 py-0.5 rounded text-[10px] hover:bg-gray-200 border transition flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="fas fa-file-alt"></i> TXT
          </button>
          <button
            id="pdfBtn"
            onclick="tryDownloadPDF()"
            class="bg-gray-50 text-gray-700 px-0.5 py-0.5 rounded text-[10px] hover:bg-gray-200 border transition cursor-pointer flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="far fa-file-pdf"></i> PDF
          </button>
          <button
            id="borderBtn"
            onclick="showBorderModal()"
            class="bg-orange-50 text-orange-600 px-0.5 py-0.5 rounded text-[10px] hover:bg-orange-100 border border-orange-200 transition flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="fas fa-cog"></i> پیج سیٹنگ
          </button>
          <button
            id="pageSizeBtn"
            onclick="showPageSizeModal()"
            class="bg-indigo-50 text-indigo-600 px-0.5 py-0.5 rounded text-[10px] hover:bg-indigo-100 border border-indigo-200 transition flex items-center justify-center gap-1 min-w-[45px]"
          >
            <i class="fas fa-expand"></i> پیج سائز
          </button>
        </div>
        <div class="relative">
          <input
            type="text"
            id="localSearchInput"
            placeholder="اس کتاب میں تلاش کریں..."
            class="w-full border-2 border-gray-200 p-2 rounded-lg focus:border-blue-500 outline-none pr-8"
          />
          <i class="fas fa-filter absolute left-3 top-3 text-gray-400"></i>
        </div>
        <button
          onclick="openNewPoem()"
          class="bg-emerald-600 text-white text-xl py-2 rounded-xl shadow hover:bg-emerald-700 transition transform active:scale-95"
        >
          <i class="fas fa-pen-nib"></i> نئی کاوش لکھیں
        </button>
        <div
          class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden flex flex-col h-[60vh]"
        >
          <div
            class="bg-gray-50 p-2 border-b text-center font-bold text-gray-600 shadow-sm"
          >
            فہرست (ترتیب بدلنے کے لیے ڈریگ کریں)
          </div>
          <div
            id="poemsListContainer"
            class="flex-grow overflow-y-auto divide-y divide-gray-100 custom-scrollbar"
          ></div>
        </div>
      </div>
      <div
        id="editorInterface"
        class="w-full hidden bg-gray-100 flex flex-col h-screen absolute inset-0 z-50"
      >
        <div
          class="flex justify-between items-center p-2 bg-white border-b shadow-sm shrink-0 z-20 w-full overflow-hidden gap-2"
        >
          <input
            type="text"
            id="poemTitle"
            placeholder="کاوش کا نام"
            class="bg-transparent text-lg font-bold text-blue-900 outline-none min-w-0 flex-1 placeholder-gray-400"
            oninput="updateTitleDisplay()"
          />
          <div class="flex items-center gap-1 shrink-0">
            <div
              class="flex bg-gray-100 rounded overflow-hidden border border-gray-300 h-6"
            >
              <button
                onclick="changeTitleSize(-2)"
                class="w-6 hover:bg-gray-200 text-gray-600 font-bold text-[10px] flex items-center justify-center"
                title="عنوان چھوٹا کریں"
              >
                A-
              </button>
              <span
                id="titleSizeDisplay"
                class="text-[10px] font-mono bg-white font-bold text-blue-600 w-6 flex items-center justify-center border-x border-gray-200"
                >36</span
              >
              <button
                onclick="changeTitleSize(2)"
                class="w-6 hover:bg-gray-200 text-gray-600 font-bold text-[10px] flex items-center justify-center"
                title="عنوان بڑا کریں"
              >
                A+
              </button>
            </div>
            <div
              class="flex bg-gray-100 rounded overflow-hidden border border-gray-300 h-6"
            >
              <button
                onclick="changeEditorZoom(-0.1)"
                class="w-6 hover:bg-gray-200 text-gray-600 text-[10px] flex items-center justify-center"
              >
                -
              </button>
              <span
                id="editorZoomDisplay"
                class="text-[10px] font-mono bg-white w-9 flex items-center justify-center border-x border-gray-200"
                >100%</span
              >
              <button
                onclick="changeEditorZoom(0.1)"
                class="w-6 hover:bg-gray-200 text-gray-600 text-[10px] flex items-center justify-center"
              >
                +
              </button>
            </div>
            <button
              onclick="backToBookView()"
              class="text-gray-400 hover:text-red-500 text-lg px-2 transition"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <div
          class="flex flex-col gap-1 p-2 bg-blue-50 border-b shadow-inner shrink-0 z-20"
        >
          <div class="flex justify-start gap-2 items-center w-full">
            <button
              onclick="showWaznModal()"
              class="bg-indigo-600 text-white px-2 py-0.5 rounded text-xs shadow hover:bg-indigo-700 transition shrink-0"
            >
              وزن
            </button>
            <span
              id="selectedWaznDisplay"
              class="text-indigo-800 font-bold text-xs text-right flex-grow truncate"
            ></span>
          </div>
          <div class="flex justify-start gap-2 items-center w-full">
            <button
              onclick="showQawafiModal()"
              class="bg-sky-600 text-white px-2 py-0.5 rounded text-xs shadow hover:bg-sky-700 transition shrink-0"
            >
              قوافی
            </button>
            <div
              id="selectedRhymesDisplay"
              class="flex-grow flex gap-2 overflow-x-auto whitespace-nowrap no-scrollbar items-center bg-gray-50 border rounded px-2 h-8"
            ></div>
          </div>
        </div>
        <div
          class="flex flex-col gap-0.5 p-1 bg-gray-50 border-b shadow-inner shrink-0 z-20"
        >
          <div
            class="flex flex-wrap gap-0.5 items-center justify-center w-full"
          >
            <label
              class="flex items-center gap-1 cursor-pointer bg-white border rounded px-1 hover:bg-gray-50 select-none transition shadow-sm h-6"
            >
              <input
                type="checkbox"
                id="applyToAllCheck"
                class="accent-blue-600 w-2.5 h-2.5 cursor-pointer"
              />
              <span
                class="text-[10px] font-bold text-gray-600 font-jameel pt-0.5"
                >تمام</span
              >
            </label>
            <div
              class="flex border rounded bg-white overflow-hidden shadow-sm items-center h-6"
            >
              <button
                onclick="changePadding(-4)"
                class="w-6 hover:bg-gray-100 transition border-r text-gray-600 h-full flex items-center justify-center"
                title="پیڈنگ کم کریں"
              >
                <i class="fas fa-compress-alt text-[8px]"></i>
              </button>
              <button
                onclick="changePadding(4)"
                class="w-6 hover:bg-gray-100 transition text-gray-600 h-full flex items-center justify-center"
                title="پیڈنگ زیادہ کریں"
              >
                <i class="fas fa-expand-alt text-[8px]"></i>
              </button>
            </div>
            <div
              class="flex border rounded bg-white overflow-hidden shadow-sm h-6"
            >
              <button
                onclick="alignText('right')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-600 flex items-center justify-center"
              >
                <i class="fas fa-align-right text-[10px]"></i>
              </button>
              <button
                onclick="alignText('center')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-600 flex items-center justify-center"
              >
                <i class="fas fa-align-center text-[10px]"></i>
              </button>
              <button
                onclick="alignText('left')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-600 flex items-center justify-center"
              >
                <i class="fas fa-align-left text-[10px]"></i>
              </button>
              <button
                onclick="alignText('justify')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-600 flex items-center justify-center"
                title="Justify"
              >
                <i class="fas fa-align-justify text-[10px]"></i>
              </button>
              <button
                onclick="alignText('justify-line')"
                class="w-6 hover:bg-blue-50 transition text-gray-600 flex items-center justify-center"
                title="Poetry Justify"
              >
                <i class="fas fa-text-width text-[10px]"></i>
              </button>
            </div>
            <button
              onclick="copyEditorFull(this)"
              class="bg-white border rounded w-6 h-6 flex items-center justify-center text-[10px] hover:bg-green-50 text-green-600 transition shadow-sm"
            >
              <i class="far fa-copy"></i>
            </button>
            <button
              onclick="showPasteModal()"
              class="bg-white border rounded w-6 h-6 flex items-center justify-center text-[10px] hover:bg-blue-50 text-blue-600 transition shadow-sm"
            >
              <i class="far fa-clipboard"></i>
            </button>
            <button
              onclick="showClearEditorModal()"
              class="bg-white border rounded w-6 h-6 flex items-center justify-center text-[10px] hover:bg-red-50 text-red-500 transition shadow-sm"
            >
              <i class="fas fa-eraser"></i>
            </button>
            <button
              onclick="document.execCommand('undo')"
              class="bg-white border rounded w-6 h-6 flex items-center justify-center text-[10px] hover:bg-gray-100 text-gray-700 transition shadow-sm"
              title="انڈو"
            >
              <i class="fas fa-undo"></i>
            </button>
            <button
              onclick="document.execCommand('redo')"
              class="bg-white border rounded w-6 h-6 flex items-center justify-center text-[10px] hover:bg-gray-100 text-gray-700 transition shadow-sm"
              title="ریڈو"
            >
              <i class="fas fa-redo"></i>
            </button>
          </div>
          <div
            class="flex flex-wrap gap-0.5 items-center justify-center w-full"
          >
            <button
              onclick="showFontModal()"
              class="bg-white border rounded px-1 text-[10px] hover:bg-gray-50 transition w-12 text-center truncate shadow-sm h-6 font-bold"
              id="fontBtnDisplay"
              title="فونٹ تبدیل کریں"
            >
              جمیل
            </button>
            <div
              class="flex border rounded bg-white overflow-hidden shadow-sm items-center h-6"
            >
              <button
                onclick="resizeText(-1)"
                class="w-6 hover:bg-gray-100 transition border-r text-gray-600 h-full flex items-center justify-center font-bold text-[10px]"
                title="سائز کم کریں"
              >
                A-
              </button>
              <button
                onclick="resizeText(1)"
                class="w-6 hover:bg-gray-100 transition text-gray-600 h-full flex items-center justify-center font-bold text-[10px]"
                title="سائز زیادہ کریں"
              >
                A+
              </button>
            </div>
            <div
              class="flex border rounded bg-white overflow-hidden shadow-sm h-6"
            >
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('bold')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 font-bold flex items-center justify-center text-[10px]"
                title="بولڈ"
              >
                B
              </button>
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('italic')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 italic flex items-center justify-center text-[10px]"
                title="ترچھا"
              >
                I
              </button>
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('underline')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 underline flex items-center justify-center text-[10px]"
                title="انڈر لائن"
              >
                U
              </button>
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('strikeThrough')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 line-through flex items-center justify-center text-[10px]"
                title="درمیان لائن"
              >
                S
              </button>
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('overline')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 flex items-center justify-center text-[10px]"
                style="text-decoration: overline"
                title="اوپر لائن"
              >
                O
              </button>
              <button
                onmousedown="event.preventDefault()"
                onclick="applyInlineStyle('quotes')"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-800 flex items-center justify-center font-jameel font-bold text-[10px]"
                title="واوین"
              >
                ” “
              </button>
              <input
                type="color"
                onchange="applyInlineStyle('foreColor', this.value)"
                class="w-6 h-full cursor-pointer border-none p-0 bg-transparent"
                title="ٹیکسٹ کلر"
              />
            </div>
            <div
              class="flex border rounded bg-white overflow-hidden shadow-sm h-6"
            >
              <button
                onclick="insertTableModal()"
                class="w-6 hover:bg-blue-50 border-l transition text-gray-600 flex items-center justify-center"
                title="ٹیبل شامل کریں"
              >
                <i class="fas fa-table text-[10px]"></i>
              </button>
              <button
                onclick="deleteCurrentTable()"
                class="w-6 hover:bg-red-50 border-l transition text-red-500 flex items-center justify-center"
                title="ٹیبل ڈیلیٹ کریں"
              >
                <i class="fas fa-table text-[10px]"></i
                ><i class="fas fa-times text-[8px] -ml-1 mt-2"></i>
              </button>
            </div>
          </div>
        </div>
        <div
          id="editorScrollArea"
          class="flex-grow overflow-auto bg-gray-200 p-8 flex justify-center items-start relative custom-scrollbar cursor-text"
          onclick="focusEditor()"
        >
          <div
            id="editorPageContainer"
            class="bg-white shadow-2xl transition-transform origin-top flex flex-col shrink-0 relative"
          >
            <div
              id="editorHeaderInfo"
              class="h-12 w-full flex justify-between items-center px-8 border-b border-gray-100 text-xs text-gray-400 absolute top-0 left-0 right-0 z-30"
            >
              <span id="edBookTitle"></span>
              <span class="font-bold">1</span>
              <span id="edChapterTitle"></span>
            </div>
            <div
              id="editorBorderWrapper"
              class="flex-grow relative z-20 overflow-hidden flex flex-col"
              onclick="focusEditor()"
            >
              <h1
                id="poemTitleDisplay"
                class="w-full text-center font-jameel font-bold p-2 outline-none mt-20 z-30 relative"
                style="line-height: 1.4; color: black"
              ></h1>
              <div
                id="poemContent"
                contenteditable="true"
                class="w-full flex-grow outline-none overflow-hidden bg-transparent custom-scrollbar text-center relative z-20"
                spellcheck="false"
                style="white-space: pre-wrap; word-break: break-word"
              ></div>
              <div
                id="editorBordersLayer"
                class="absolute inset-0 pointer-events-none z-10"
              ></div>
            </div>
            <div
              id="editorFooterInfo"
              class="h-10 w-full flex justify-center items-center absolute bottom-0 left-0 right-0 text-xs text-gray-300 z-30 font-jameel"
            ></div>
          </div>
        </div>
        <div
          class="p-3 border-t bg-white flex gap-2 shrink-0 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.1)]"
        >
          <button
            id="savePoemBtn"
            class="flex-grow bg-blue-700 text-white py-2 rounded shadow hover:bg-blue-800 font-bold transition"
          >
            محفوظ کریں
          </button>
          <button
            onclick="previewPoem()"
            class="bg-yellow-500 text-white px-6 py-2 rounded shadow hover:bg-yellow-600 font-bold transition"
            title="پی ڈی ایف پریویو"
          >
            <i class="fas fa-eye"></i> دیکھیں
          </button>
          <button
            onclick="showDeletePoemModal()"
            id="deletePoemBtn"
            class="bg-red-100 text-red-600 px-4 py-2 rounded shadow hover:bg-red-200 hidden transition"
          >
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    </main>
    <div id="printArea" class="hidden"></div>
    <div
      id="universalModal"

    <script>
      let currentBookLanguage = "urdu";

      // localStorage-based database replacement
      const db = {
        collection: function (name) {
          return {
            doc: function (docId) {
              const baseKey = `${name}/${docId}`;
              return {
                get: function () {
                  return Promise.resolve({
                    exists: localStorage.getItem(baseKey) !== null,
                    data: () =>
                      JSON.parse(localStorage.getItem(baseKey) || "{}"),
                    id: docId,
                  });
                },
                set: function (data) {
                  localStorage.setItem(baseKey, JSON.stringify(data));
                  return Promise.resolve();
                },
                update: function (data) {
                  const existing = JSON.parse(
                    localStorage.getItem(baseKey) || "{}",
                  );
                  const merged = { ...existing, ...data };
                  localStorage.setItem(baseKey, JSON.stringify(merged));
                  return Promise.resolve();
                },
                delete: function () {
                  localStorage.removeItem(baseKey);
                  return Promise.resolve();
                },
                collection: function (subName) {
                  return db.collection(baseKey + "/" + subName);
                },
              };
            },
            add: function (data) {
              const id =
                "doc_" +
                Date.now() +
                "_" +
                Math.random().toString(36).substr(2, 9);
              const fullKey = `${name}/${id}`;
              data.id = id;
              localStorage.setItem(fullKey, JSON.stringify(data));
              return Promise.resolve({ ref: { path: fullKey }, id: id });
            },
            get: function () {
              return Promise.resolve({
                docs: Array.from({ length: localStorage.length }).reduce(
                  (acc, _, i) => {
                    const key = localStorage.key(i);
                    if (key && key.startsWith(name + "/")) {
                      const data = JSON.parse(localStorage.getItem(key));
                      acc.push({
                        data: () => data,
                        id: data.id || key.split("/").pop(),
                        ref: { path: key },
                      });
                    }
                    return acc;
                  },
                  [],
                ),
              });
            },
          };
        },
        batch: function () {
          const ops = [];
          return {
            delete: function (ref) {
              ops.push({ type: "delete", path: ref.path });
            },
            commit: function () {
              ops.forEach((op) => {
                if (op.type === "delete") localStorage.removeItem(op.path);
              });
              return Promise.resolve();
            },
          };
        },
      };

      // localStorage-based auth
      const auth = {
        signInWithPopup: function () {
          return Promise.resolve({ user: getCurrentUser() });
        },
        signOut: function () {
          localStorage.removeItem("currentUser");
          return Promise.resolve();
        },
      };

      function getCurrentUser() {
        let user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user) {
          const userId = "user_" + Date.now();
          user = {
            uid: userId,
            email: "admin@local",
            displayName: "Administrator",

          };
          localStorage.setItem("currentUser", JSON.stringify(user));
        }
        return user;
      }

      let currentUser = null,
        currentBookId = null,
        currentBookName = "",
        currentBookAuthor = "",
        currentPoemId = null;
      let allBooks = [],
        currentBookPoems = [],
        selectedRhymes = new Set(),
        buhoorData = [],
        aozanData = [];
      let currentFontSize = 24,
        currentFontFamily = "font-jameel",
        currentAlignment = "center",
        currentPadding = 24;
      let draggedItem = null;
      window.currentCoverColor = "#ffffff";
      let areFontsLoaded = true;
      let writingToolsData = null;
      window.currentEditorZoom = 1.0;
      let currentBookSettings = {
        border: {
          top: true,
          bottom: true,
          left: true,
          right: true,
          style: "solid",
          width: 1,
        },
        watermark: "",
        titlePage: {},
        toc: {},
      };
      document.addEventListener("selectionchange", () => {
        const editor = document.getElementById("poemContent");
        const sel = window.getSelection();
        if (editor && sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
          const range = sel.getRangeAt(0);
          if (!range.collapsed) {
            window.savedSelectionRange = range.cloneRange();
          }
        }
      });
      window.resizeText = (d) => {
        const applyToAll = document.getElementById("applyToAllCheck").checked;
        if (applyToAll) {
          applyStyleToSelection("fontSize", d, true, "px");
          window.currentFontSize += d;
          if (window.currentFontSize < 1) window.currentFontSize = 1;
        } else {
          const editor = document.getElementById("poemContent");
          const sel = window.getSelection();
          if (window.savedSelectionRange) {
            sel.removeAllRanges();
            sel.addRange(window.savedSelectionRange);
          }
          editor.focus();
          if (!sel.rangeCount || sel.isCollapsed) return;
          let parent = sel.anchorNode;
          if (parent.nodeType === 3) parent = parent.parentNode;
          let currentSize =
            parseFloat(window.getComputedStyle(parent).fontSize) || 24;
          let newSize = currentSize + d;
          if (newSize < 1) newSize = 1;
          document.execCommand("styleWithCSS", false, true);
          document.execCommand("fontSize", false, "7");
          const fonts = editor.querySelectorAll('font[size="7"]');
          fonts.forEach((f) => {
            f.removeAttribute("size");
            f.style.fontSize = newSize + "px";
          });
          const spans = editor.querySelectorAll("span");
          spans.forEach((s) => {
            if (s.style.fontSize === "xxx-large" || s.style.fontSize === "7") {
              s.style.fontSize = newSize + "px";
            }
          });
        }
      };
      window.changeFont = (f) => {
        let fontName = "Payami Nastaleeq";
        let btnText = "جمیل";
        if (f === "font-mehr") {
          fontName = "Mehr";
          btnText = "مہر";
        } else if (f === "font-alqalam") {
          fontName = "AlQalam";
          btnText = "القلم";
        } else if (f === "font-custom") {
          fontName = "CustomGlobal";
          btnText = "کسٹم";
        }
        const applyToAll = document.getElementById("applyToAllCheck").checked;
        if (applyToAll) {
          applyStyleToSelection("fontFamily", fontName);
        } else {
          const editor = document.getElementById("poemContent");
          const sel = window.getSelection();
          if (window.savedSelectionRange) {
            sel.removeAllRanges();
            sel.addRange(window.savedSelectionRange);
          }
          editor.focus();
          if (sel.rangeCount && !sel.isCollapsed) {
            document.execCommand("styleWithCSS", false, true);
            document.execCommand("fontName", false, fontName);
          }
        }
        const fontBtn = document.getElementById("fontBtnDisplay");
        if (fontBtn) fontBtn.innerText = btnText;
        closeUniversalModal();
      };
      window.applyInlineStyle = (command, value = null) => {
        const editor = document.getElementById("poemContent");
        const sel = window.getSelection();
        if (window.savedSelectionRange) {
          sel.removeAllRanges();
          sel.addRange(window.savedSelectionRange);
        }
        editor.focus();
        if (!sel.rangeCount || sel.isCollapsed) return;
        if (command === "quotes") {
          const range = sel.getRangeAt(0);
          const text = sel.toString().trim();
          if (text.startsWith("”") && text.endsWith("“")) {
            const frag = range.extractContents();
            const div = document.createElement("div");
            div.appendChild(frag);
            const walkFirst = document.createTreeWalker(
              div,
              NodeFilter.SHOW_TEXT,
              null,
              false,
            );
            let node;
            while ((node = walkFirst.nextNode())) {
              if (node.nodeValue.includes("”")) {
                node.nodeValue = node.nodeValue.replace("”", "");
                break;
              }
            }
            const walkLast = document.createTreeWalker(
              div,
              NodeFilter.SHOW_TEXT,
              null,
              false,
            );
            let nodes = [];
            while ((node = walkLast.nextNode())) nodes.push(node);
            for (let i = nodes.length - 1; i >= 0; i--) {
              if (nodes[i].nodeValue.includes("“")) {
                const val = nodes[i].nodeValue;
                const lastIdx = val.lastIndexOf("“");
                nodes[i].nodeValue =
                  val.substring(0, lastIdx) + val.substring(lastIdx + 1);
                break;
              }
            }
            range.insertNode(div);
            const parent = div.parentNode;
            while (div.firstChild) parent.insertBefore(div.firstChild, div);
            parent.removeChild(div);
          } else {
            const frag = range.extractContents();
            const span = document.createElement("span");
            span.appendChild(document.createTextNode("”"));
            span.appendChild(frag);
            span.appendChild(document.createTextNode("“"));
            range.insertNode(span);
          }
          return;
        }
        if (command === "overline") {
          const range = sel.getRangeAt(0);
          let node = range.commonAncestorContainer;
          if (node.nodeType === 3) node = node.parentNode;
          let parentOverline = null;
          let temp = node;
          while (temp && temp.id !== "poemContent") {
            if (
              temp.style &&
              temp.style.textDecoration &&
              temp.style.textDecoration.includes("overline")
            ) {
              parentOverline = temp;
              break;
            }
            temp = temp.parentNode;
          }
          if (parentOverline) {
            const parent = parentOverline.parentNode;
            while (parentOverline.firstChild) {
              parent.insertBefore(parentOverline.firstChild, parentOverline);
            }
            parent.removeChild(parentOverline);
          } else {
            const frag = range.extractContents();
            const tempDiv = document.createElement("div");
            tempDiv.appendChild(frag);
            const spans = tempDiv.querySelectorAll("span");
            let hasOverlineInside = false;
            spans.forEach((s) => {
              if (
                s.style &&
                s.style.textDecoration &&
                s.style.textDecoration.includes("overline")
              ) {
                hasOverlineInside = true;
                const p = s.parentNode;
                while (s.firstChild) p.insertBefore(s.firstChild, s);
                p.removeChild(s);
              }
            });
            if (hasOverlineInside) {
              range.insertNode(tempDiv);
            } else {
              const span = document.createElement("span");
              span.style.textDecoration = "overline";
              while (tempDiv.firstChild) span.appendChild(tempDiv.firstChild);
              range.insertNode(span);
            }
            if (tempDiv.parentNode) {
              const p = tempDiv.parentNode;
              while (tempDiv.firstChild)
                p.insertBefore(tempDiv.firstChild, tempDiv);
              p.removeChild(tempDiv);
            }
          }
          return;
        }
        document.execCommand("styleWithCSS", false, true);
        document.execCommand(command, false, value);
      };
      window.applyStyleToSelection = (
        property,
        value,
        isDelta = false,
        unit = "",
      ) => {
        const editor = document.getElementById("poemContent");
        const applyToAll = document.getElementById("applyToAllCheck").checked;
        if (editor.children.length === 0) {
          editor.innerHTML = "<div><br></div>";
        }
        const isBlockProp = [
          "paddingRight",
          "paddingLeft",
          "textAlign",
          "textAlignLast",
        ].includes(property);
        const setStyle = (el) => {
          if (!el || el.nodeType !== 1) return;
          if (isDelta) {
            const currentStyle = window.getComputedStyle(el);
            let currentVal =
              parseFloat(currentStyle[property]) ||
              (property === "fontSize" ? 24 : 0);
            let newVal = currentVal + value;
            if (newVal < 0) newVal = 0;
            el.style[property] = newVal + unit;
          } else {
            el.style[property] = value;
          }
        };
        if (applyToAll) {
          Array.from(editor.children).forEach((child) => {
            if (child.tagName === "TABLE") {
              Array.from(child.querySelectorAll("td, th")).forEach((td) =>
                setStyle(td),
              );
            } else {
              setStyle(child);
              if (!isBlockProp) {
                Array.from(child.querySelectorAll("*")).forEach((sub) =>
                  setStyle(sub),
                );
              }
            }
          });
        } else {
          const sel = window.getSelection();
          if (!sel.rangeCount) return;
          if (isBlockProp) {
            let node = sel.anchorNode;
            let block = null;
            while (node && node !== editor) {
              if (
                node.nodeType === 1 &&
                ["DIV", "P", "TD", "TH", "LI"].includes(node.tagName)
              ) {
                block = node;
                break;
              }
              node = node.parentNode;
            }
            if (block) {
              setStyle(block);
            } else if (editor.firstChild && editor.firstChild.nodeType === 1) {
              setStyle(editor.firstChild);
            }
          } else {
            let node = sel.anchorNode;
            if (node && node.nodeType === 3) node = node.parentNode;
            let current = node;
            while (current && current !== editor) {
              if (current.tagName === "TD" || current.tagName === "TH") {
                setStyle(current);
                break;
              }
              if (current.parentNode === editor) {
                setStyle(current);
                Array.from(current.querySelectorAll("*")).forEach((sub) =>
                  setStyle(sub),
                );
                break;
              }
              current = current.parentNode;
            }
          }
        }
      };
      window.duplicateBook = async (bookId) => {
        let btn = window.event ? window.event.currentTarget : null;
        let originalHtml = "";
        if (btn) {
          originalHtml = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
          btn.disabled = true;
        }
        try {
          const userRef = db.collection("users").doc(currentUser.uid);
          const sourceBookRef = userRef.collection("books").doc(bookId);
          const bookDoc = await sourceBookRef.get();
          if (!bookDoc.exists) {
            alert("کتاب نہیں ملی!");
            if (btn) {
              btn.innerHTML = originalHtml;
              btn.disabled = false;
            }
            return;
          }
          const originalBookData = bookDoc.data();
          const originalName = originalBookData.name || "بے عنوان";
          const newBookData = {
            ...originalBookData,
            name: originalName + " (کاپی)",
            timestamp: new Date().toISOString(),
            order: Date.now(),
          };
          const newBookRef = await userRef.collection("books").add(newBookData);
          const poemsSnap = await sourceBookRef.collection("poems").get();
          if (!poemsSnap.empty) {
            const batch = db.batch();
            poemsSnap.forEach((doc) => {
              const poemData = doc.data();
              const newPoemRef = newBookRef.collection("poems").doc();
              batch.set(newPoemRef, {
                ...poemData,
                bookId: newBookRef.id,
                timestamp: new Date().toISOString(),
              });
            });
            await batch.commit();
          }
          loadBooks();
        } catch (error) {
          alert("مسئلہ: " + error.message);
          if (btn) {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
          }
        }
      };
      function getSelectedTargets(editor) {
        const sel = window.getSelection();
        if (!sel.rangeCount) return [];
        let node = sel.anchorNode;
        if (editor.contains(node) === false) return [];
        if (node.nodeType === 3) node = node.parentNode;
        let current = node;
        while (current && current !== editor) {
          if (current.tagName === "TD" || current.tagName === "TH") {
            return [current];
          }
          if (current.tagName === "TABLE") {
            return Array.from(current.querySelectorAll("td, th"));
          }
          if (current.parentNode === editor) {
            return [current];
          }
          current = current.parentNode;
        }
        return [];
      }
      window.savedSelectionRange = null;

        } else {
          window.savedSelectionRange = null;
        }
        openUniversalModal(
          "ٹیبل بنائیں",
          (c) => {
            c.innerHTML = `

          },
          `<button onclick="generateTable()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">ٹیبل ڈالیں</button>`,
        );
      };
      window.generateTable = () => {
        const rows = parseInt(document.getElementById("tblRows").value) || 2;
        const cols = parseInt(document.getElementById("tblCols").value) || 2;
        const width = document.getElementById("tblWidth").value;
        let html = `<div><br></div><table style="width:${width}; border-collapse: collapse; margin: 15px auto; font-family: 'Payami Nastaleeq', serif; direction: rtl; table-layout: fixed;" border="1"><tbody>`;
        for (let r = 0; r < rows; r++) {

            html += `<td style="border: 1px solid black; padding: 8px; min-width: 30px; text-align: center; vertical-align: top; word-break: break-word;"><br></td>`;
          }
          html += `</tr>`;

        html += `</tbody></table><div><br></div>`;
        const editor = document.getElementById("poemContent");
        editor.focus();
        const sel = window.getSelection();
        if (window.savedSelectionRange) {
          sel.removeAllRanges();
          sel.addRange(window.savedSelectionRange);
        }
        if (sel.rangeCount && editor.contains(sel.anchorNode)) {
          document.execCommand("insertHTML", false, html);

          editor.innerHTML += html;

        closeUniversalModal();

        if (tableToDelete) {

        footerInfo.innerText = currentBookSettings.watermark || "";
        footerInfo.style.height = footerSpace + "px";
        headerInfo.style.height = headerSpace + "px";
        headerInfo.style.top = "0";
        footerInfo.style.bottom = "0";
        autoResizeTextarea(ta);
      }
      function autoResizeTextarea(element) {
        element.style.height = "auto";
        element.style.height = element.scrollHeight + "px";
        applyEditorZoom();
      }
      function applyEditorZoom() {
        const container = document.getElementById("editorPageContainer");
        const display = document.getElementById("editorZoomDisplay");
        if (container && display) {
          const scale = window.currentEditorZoom;
          container.style.transform = `scale(${scale})`;
          container.style.transformOrigin = "top center";
          const h = container.offsetHeight;
          const margin = h * (1 - scale);
          if (scale < 1) {
            container.style.marginBottom = `-${margin}px`;
          } else {
            container.style.marginBottom = "0";
          }
          display.innerText = Math.round(scale * 100) + "%";
        }
      }

      window.downloadBookPDF = async (isPreview = false) => {
        const loadScript = (src) => {
          return new Promise((resolve, reject) => {
            if (document.querySelector(`script[src="${src}"]`))
              return resolve();
            const script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
        };
        try {
          await loadScript(
            "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",
          );
          await loadScript(
            "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",
          );
        } catch (e) {
          alert("انٹرنیٹ کنکشن چیک کریں۔");
          return;
        }
        const btn = document.getElementById(
          isPreview ? "previewPoem" : "pdfBtn",
        );
        const originalBtnContent = btn ? btn.innerHTML : "";
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ...';
        }
        history.pushState({ modal: "pdf" }, null, "");
        const overlay = document.createElement("div");
        overlay.id = "pdf-preview-overlay";
        overlay.style.cssText =
          "position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #2d2d2d; z-index: 99999999; display: flex; flex-direction: column;";
        const toolbar = document.createElement("div");
        toolbar.style.cssText =
          "background-color: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; padding: 5px; gap: 5px; z-index: 10; border-bottom: 1px solid #444;";
        const btnStyle =
          "padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 12px; display: flex; align-items: center; gap: 6px; font-family: 'Payami Nastaleeq', serif; white-space: nowrap;";
        const closeBtn = document.createElement("button");
        closeBtn.innerHTML = '<i class="fas fa-arrow-right"></i> واپسی';
        closeBtn.style.cssText =
          btnStyle + "background-color: #4b5563; color: white;";
        closeBtn.onclick = () => {
          history.back();
        };
        toolbar.appendChild(closeBtn);
        let linkableBtn, guaranteedBtn, imagesBtn;
        if (!isPreview) {
          linkableBtn = document.createElement("button");
          linkableBtn.innerHTML = '<i class="fas fa-link"></i> لنک والی PDF';
          linkableBtn.style.cssText =
            btnStyle + "background-color: #2563eb; color: white;";
          guaranteedBtn = document.createElement("button");
          guaranteedBtn.innerHTML =
            '<i class="fas fa-file-image"></i> بغیر لنک والی یقینی PDF';
          guaranteedBtn.style.cssText =
            btnStyle + "background-color: #16a34a; color: white;";
          imagesBtn = document.createElement("button");
          imagesBtn.innerHTML = '<i class="fas fa-images"></i> ہر صفحہ الگ';
          imagesBtn.style.cssText =
            btnStyle + "background-color: #9333ea; color: white;";
          toolbar.appendChild(linkableBtn);
          toolbar.appendChild(guaranteedBtn);
          toolbar.appendChild(imagesBtn);
        }
        overlay.appendChild(toolbar);
        const scrollContainer = document.createElement("div");
        scrollContainer.style.cssText =
          "flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; position: relative; background-color: #525659;";
        const contentWrapper = document.createElement("div");
        contentWrapper.id = "pdf-content-wrapper";
        contentWrapper.style.cssText =
          "transform-origin: top center; transition: transform 0.3s ease; box-sizing: border-box;";
        scrollContainer.appendChild(contentWrapper);
        overlay.appendChild(scrollContainer);
        const toUrduDigits = (num) =>
          num.toString().replace(/\d/g, (d) => "۰۱۲۳۴۵۶۷۸۹"[d]);

        const processContent = (htmlContent) => {
          const tempDiv = document.createElement("div");
          tempDiv.innerHTML = htmlContent;
          const walker = document.createTreeWalker(
            tempDiv,
            NodeFilter.SHOW_TEXT,
            null,
            false,
          );
          let node;
          const nodesToReplace = [];
          while ((node = walker.nextNode())) {
            if (node.textContent.trim().length > 0) {
              nodesToReplace.push(node);
            }
          }
          nodesToReplace.forEach((textNode) => {
            const text = textNode.textContent;
            const parent = textNode.parentNode;
            const isInsideLink = parent.tagName === "A";
            let newHTML = text;
            if (!isInsideLink) {
              const urlRegex =
                /(https?:\/\/[^\s<]+|www\.[^\s<]+|usamasarsari\.com[^\s<]*)/gi;
              newHTML = newHTML.replace(urlRegex, (url) => {
                let href = url;
                if (!href.startsWith("http")) href = "https://" + href;
                return `<a href="${href}" target="_blank" style="color: blue !important; text-decoration: none !important; display: inline-block; direction: ltr;">${url}</a>`;
              });
            }
            const allahRegex =
              /(?:الل|لل)[\u0651\u0670]+[ہه][\u064E\u064F\u0650]/g;
            newHTML = newHTML.replace(
              allahRegex,
              (match) => `<span class="font-alqalam">${match}</span>`,
            );
            const fragment = document.createElement("span");
            fragment.innerHTML = newHTML;
            textNode.parentNode.replaceChild(fragment, textNode);
          });
          return tempDiv.innerHTML;
        };

        try {
          const bs = currentBookSettings.border || {
            top: true,
            bottom: true,
            left: true,
            right: true,
            style: "solid",
            width: 1,
          };
          const mmToPx = 3.78;
          const pageWpx = currentPageWidth * mmToPx;
          const pageHpx = currentPageHeight * mmToPx;
          const pagePadding = Math.max(15, Math.min(45, pageWpx * 0.06));
          const headerSpace = Math.max(35, Math.min(60, pageHpx * 0.06));
          const footerSpace = Math.max(30, Math.min(50, pageHpx * 0.05));
          const contentGap = 15;
          const contentSideGap = 20;

          let uiFont =
            currentBookLanguage === "arabic" ? "AlQalam" : "Payami Nastaleeq";
          let customFontCSS = window.userSettings.customFontData
            ? `@font-face { font-family: 'CustomGlobal'; src: url('${window.userSettings.customFontData}'); }`
            : "";
          const css = `
        ${customFontCSS}
        @font-face { font-family: 'Payami Nastaleeq'; src: url('https://usamasarsari.com/fonts/Jameel-Noori-Nastaleeq-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Mehr'; src: url('https://usamasarsari.com/fonts/Mehr-Nastaliq.ttf') format('truetype'); }
        @font-face { font-family: 'AlQalam'; src: url('https://usamasarsari.com/fonts/al-qalam-web.ttf') format('truetype'); }
        .pdf-page-node {
            width: ${currentPageWidth}mm;
            height: ${currentPageHeight}mm;
            position: relative;
            overflow: hidden;
            background-color: white;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .header-layer { position: absolute; top: 0; left: 0; right: 0; height: ${headerSpace}px; display: flex; align-items: center; justify-content: center; padding-bottom: 0px; z-index: 30; overflow: visible; }
        .footer-layer { position: absolute; bottom: 0; left: 0; right: 0; height: ${footerSpace}px; display: flex; align-items: center; justify-content: center; z-index: 30; overflow: hidden; }
        .border-layer { position: absolute; top: ${headerSpace}px; bottom: ${footerSpace}px; left: ${pagePadding}px; right: ${pagePadding}px; pointer-events: none; z-index: 10; }
        .content-layer { position: absolute; top: ${headerSpace + contentGap}px; bottom: ${footerSpace + contentGap}px; left: ${pagePadding + contentSideGap}px; right: ${pagePadding + contentSideGap}px; overflow: hidden; z-index: 20; display: flex; flex-direction: column; }
        .poem-content-wrapper { width: 100%; }
        h2, p { margin: 0; padding: 0; }
        a { color: blue !important; text-decoration: none !important; display: inline-block; direction: ltr; unicode-bidi: embed; }
        @media print {
            .pdf-page-node { break-after: page; page-break-after: always; margin: 0; box-shadow: none; }
        }
        `;
          const styleTag = document.createElement("style");
          styleTag.innerHTML = css;
          contentWrapper.appendChild(styleTag);
          const sortedPoems = [...currentBookPoems]
            .sort((a, b) => {
              const valA =
                a.order !== undefined
                  ? a.order
                  : a.timestamp
                    ? a.timestamp.toMillis()
                    : 0;
              const valB =
                b.order !== undefined
                  ? b.order
                  : b.timestamp
                    ? b.timestamp.toMillis()
                    : 0;
              return valB - valA;
            })
            .reverse();

          const createPagesForPoem = (poem, index) => {
            const pages = [];
            const parser = new DOMParser();
            let docBody = [];
            if (poem.content && poem.content.trim().startsWith("<")) {
              const doc = parser.parseFromString(poem.content, "text/html");
              const flattened = [];
              Array.from(doc.body.children).forEach((child) => {
                if (child.tagName === "TABLE") {
                  flattened.push(child);
                } else if (child.querySelector("table")) {
                  let currentWrapper = document.createElement("div");
                  currentWrapper.style.cssText = child.style.cssText || "";
                  const flushWrapper = () => {
                    if (
                      currentWrapper.childNodes.length > 0 &&
                      currentWrapper.textContent.trim()
                    ) {
                      flattened.push(currentWrapper);
                    }
                    currentWrapper = document.createElement("div");
                    currentWrapper.style.cssText = child.style.cssText || "";
                  };
                  Array.from(child.childNodes).forEach((n) => {
                    if (n.nodeType === 1 && n.tagName === "TABLE") {
                      flushWrapper();
                      flattened.push(n.cloneNode(true));
                    } else {
                      currentWrapper.appendChild(n.cloneNode(true));
                    }
                  });
                  flushWrapper();
                } else {
                  flattened.push(child);
                }
              });
              docBody = flattened;
              if (docBody.length === 0 && doc.body.textContent.trim()) {
                const d = document.createElement("div");
                d.innerHTML = poem.content;
                docBody = [d];
              }
            } else {
              const lines = (poem.content || "").split("\n");
              docBody = lines.map((line) => {
                const d = document.createElement("div");
                d.innerText = line;
                return d;
              });
            }
            const contentWidthPx = pageWpx - (pagePadding + contentSideGap) * 2;
            const contentHeightPx =
              pageHpx - (headerSpace + footerSpace + contentGap * 2);
            const measureDiv = document.createElement("div");
            measureDiv.style.cssText = `position: fixed; top: 0; left: 0; width: ${contentWidthPx}px; visibility: hidden; pointer-events: none; z-index: -1; background: white; padding: 0; direction: rtl;`;
            document.body.appendChild(measureDiv);
            let currentPageBlocks = [];
            let currentHeight = 0;
            const pushPage = () => {
              if (currentPageBlocks.length > 0)
                pages.push([...currentPageBlocks]);
              currentPageBlocks = [];
              currentHeight = 0;
            };
            let titleSize = (poem.titleSize || 36) + "px";
            if (poem.title) {
              const h2 = document.createElement("h2");
              h2.id = `poem-target-${index}`;
              h2.style.cssText = `font-size: ${titleSize}; font-family: 'Payami Nastaleeq'; margin: 20px 0 15px 0; padding: 0; text-align: center; font-weight: bold; width: 100%; direction: rtl;`;
              h2.innerHTML = processContent(poem.title);
              measureDiv.appendChild(h2);
              const h2Height =
                measureDiv.offsetHeight || h2.getBoundingClientRect().height;
              if (h2Height > contentHeightPx) {
                currentPageBlocks.push({ html: h2.outerHTML });
                pushPage();
              } else {
                currentPageBlocks.push({ html: h2.outerHTML });
                currentHeight += h2Height;
              }
              measureDiv.innerHTML = "";
            }
            for (let i = 0; i < docBody.length; i++) {
              const block = docBody[i];
              if (block.tagName === "TABLE") {
                const clone = block.cloneNode(true);
                clone.querySelectorAll("td, th").forEach((cell) => {
                  cell.innerHTML = processContent(cell.innerHTML);
                  cell.style.border = "1px solid black";
                  cell.style.padding = "8px";
                  cell.style.wordBreak = "break-word";
                });
                clone.style.width = "100%";
                clone.style.margin = "15px auto";
                clone.style.borderCollapse = "collapse";
                clone.style.direction = "rtl";
                clone.style.tableLayout = "fixed";
                clone.setAttribute("border", "1");
                measureDiv.appendChild(clone);
                const tblHeight = measureDiv.getBoundingClientRect().height;
                if (
                  currentHeight + tblHeight > contentHeightPx &&
                  currentHeight > 0
                ) {
                  pushPage();
                  measureDiv.innerHTML = "";
                  measureDiv.appendChild(clone);
                }
                currentPageBlocks.push({ html: clone.outerHTML });
                currentHeight +=
                  measureDiv.getBoundingClientRect().height || tblHeight;
                measureDiv.innerHTML = "";
                continue;
              }
              const style = block.style || {};
              let fSize = style.fontSize || "24px";
              const fFamily = style.fontFamily || "Payami Nastaleeq";
              const align = style.textAlign || "justify";
              const alignLast = style.textAlignLast || "auto";
              const pRight = style.paddingRight || "0px";
              const pLeft = style.paddingLeft || "0px";
              let fWeight = "normal";
              const computedCSS = `font-family: '${fFamily}', serif; font-size: ${fSize}; font-weight: ${fWeight}; text-align: ${align}; text-align-last: ${alignLast}; padding-right: ${pRight}; padding-left: ${pLeft}; line-height: 2.0; white-space: pre-wrap; margin: 0 0 10px 0; width: 100%; word-break: break-word; direction: rtl; display: block;`;
              const clone = document.createElement("div");
              clone.style.cssText = computedCSS;
              clone.innerHTML = processContent(block.innerHTML);
              measureDiv.appendChild(clone);
              const cloneHeight =
                measureDiv.offsetHeight || clone.getBoundingClientRect().height;
              if (currentHeight + cloneHeight <= contentHeightPx) {
                currentPageBlocks.push({ html: clone.outerHTML });
                currentHeight += cloneHeight;
                measureDiv.innerHTML = "";
              } else {
                measureDiv.innerHTML = "";
                const rawText = block.innerText || block.textContent;
                const words = rawText.split(" ");
                let buffer = "";
                let tempP = document.createElement("div");
                tempP.style.cssText = computedCSS;
                measureDiv.appendChild(tempP);
                for (let k = 0; k < words.length; k++) {
                  const w = words[k];
                  const testLine = buffer ? buffer + " " + w : w;
                  tempP.innerHTML = processContent(testLine);
                  const newHeight = tempP.getBoundingClientRect().height;
                  if (currentHeight + newHeight > contentHeightPx) {
                    if (buffer) {
                      const pFinal = document.createElement("div");
                      pFinal.style.cssText = computedCSS;
                      pFinal.innerHTML = processContent(buffer);
                      currentPageBlocks.push({ html: pFinal.outerHTML });
                    }
                    pushPage();
                    buffer = w;
                    tempP.innerHTML = processContent(buffer);
                    currentHeight = tempP.getBoundingClientRect().height;
                  } else {
                    buffer = testLine;
                  }
                }
                if (buffer) {
                  const pFinal = document.createElement("div");
                  pFinal.style.cssText = computedCSS;
                  pFinal.innerHTML = processContent(buffer);
                  currentPageBlocks.push({ html: pFinal.outerHTML });
                  currentHeight += tempP.getBoundingClientRect().height;
                }
                measureDiv.innerHTML = "";
              }
            }
            if (currentPageBlocks.length > 0)
              pages.push([...currentPageBlocks]);
            document.body.removeChild(measureDiv);
            return pages;
          };

          const itemsPerPage = Math.max(
            5,
            Math.floor((currentPageHeight - 80) / 20),
          );
          let pageCounter = 1;
          const poemMapping = sortedPoems.map((p, index) => {
            const pages = createPagesForPoem(p, index);
            const start = pageCounter;
            pageCounter += pages.length;
            return {
              ...p,
              generatedPages: pages,
              startPage: start,
              linkId: `poem-target-${index}`,
            };
          });

          let borderHTML = "";
          if (bs.emoji) {
            const hStyle =
              "position:absolute; display:flex; justify-content:center; align-items:center; overflow:hidden; white-space:nowrap; font-size:14px; line-height:14px; width:100%;";
            const vStyle =
              "position:absolute; top:0; bottom:0; width:20px; display:flex; flex-direction:column; align-items:center; overflow:hidden; font-size:14px; line-height:14px; word-break:break-all; text-align:center; white-space:normal;";
            let t = bs.top
              ? `<div style="${hStyle} top:0;">${bs.emoji.repeat(80)}</div>`
              : "";
            let b = bs.bottom
              ? `<div style="${hStyle} bottom:0;">${bs.emoji.repeat(80)}</div>`
              : "";
            let l = bs.left
              ? `<div style="${vStyle} left:0;">${bs.emoji.repeat(140)}</div>`
              : "";
            let r = bs.right
              ? `<div style="${vStyle} right:0;">${bs.emoji.repeat(140)}</div>`
              : "";
            borderHTML = `<div class="border-layer">${t}${b}${l}${r}</div>`;
          } else {
            const w = bs.width || 1;
            const s = bs.style || "solid";
            const c = bs.color || "black";
            const t = bs.top ? `${w}px ${s} ${c}` : "none";
            const b = bs.bottom ? `${w}px ${s} ${c}` : "none";
            const l = bs.left ? `${w}px ${s} ${c}` : "none";
            const r = bs.right ? `${w}px ${s} ${c}` : "none";
            borderHTML = `<div class="border-layer" style="border-top:${t}; border-bottom:${b}; border-left:${l}; border-right:${r};"></div>`;
          }

          const addPage = (innerHtml) => {
            const div = document.createElement("div");
            div.className = "pdf-page-node";
            div.innerHTML = innerHtml;
            contentWrapper.appendChild(div);
          };

          if (!isPreview) {
            const customTitleImg = localStorage.getItem(
              "titleImage_" + currentBookId,
            );
            if (customTitleImg) {
              addPage(
                `<img src="${customTitleImg}" style="width:100%; height:100%; object-fit:contain;">`,
              );
            } else {
              const ts = currentBookSettings.titlePage || {};
              const tFont = ts.tFont || "Payami Nastaleeq";
              const tSize = ts.tSize || 48;
              const tColor = ts.tColor || "#000000";
              const tAlign = ts.tAlign || "center";
              const tTop = ts.tTop || 30;
              const aFont = ts.aFont || "Payami Nastaleeq";
              const aSize = ts.aSize || 32;
              const aColor = ts.aColor || "#000000";
              const aAlign = ts.aAlign || "center";
              const aBottom = ts.aBottom || 30;
              const hex = (
                window.currentCoverColor ||
                window.userSettings.themeColor ||
                "#ffffff"
              ).replace("#", "");
              const r = parseInt(hex.substring(0, 2), 16);
              const g = parseInt(hex.substring(2, 4), 16);
              const b = parseInt(hex.substring(4, 6), 16);
              const goldColor =
                (r * 299 + g * 587 + b * 114) / 1000 > 125
                  ? "#b45309"
                  : "#fbbf24";
              addPage(`
                <div style="width:100%; height:100%; padding:20px; display:flex; flex-direction:column; justify-content:space-between; background-color:${window.currentCoverColor || window.userSettings.themeColor}; border:8px double ${goldColor}; box-sizing:border-box;">
                <div style="margin-top:${tTop}%; text-align:${tAlign};">
                <h1 style="font-size:${tSize}px; font-family:'${tFont}'; color:${tColor}; line-height:1.4;">${processContent(currentBookName)}</h1>
                </div>
                <div style="margin-bottom:${aBottom}%; text-align:${aAlign};">
                <h2 style="font-size:${aSize}px; font-family:'${aFont}'; color:${aColor};">${currentBookAuthor || currentUser.displayName}</h2>
                </div>
                </div>
                `);
            }
            let globalPageNum = 1;
            const tocS = currentBookSettings.toc || {};
            const tSize = parseInt(tocS.titleSize) || 32;
            const tColor = tocS.titleColor || "#000000";
            const tFont = tocS.titleFont || "Payami Nastaleeq";
            const iFont = tocS.itemFont || "Payami Nastaleeq";
            const iSize = parseInt(tocS.itemSize) || 20;
            const iColor = tocS.itemColor || "#000000";
            const iLineH = parseFloat(tocS.lineHeight) || 1.8;
            const customTitle = tocS.customTitle || "فہرست";
            const reservedHeight = 80 + tSize * 2.5 + 40;
            const totalPagePx = pageHpx;
            const availableForItems = totalPagePx - reservedHeight;
            const itemHeightEstimate = iSize * iLineH + 15;
            let dynItemsPerPage = Math.floor(
              availableForItems / itemHeightEstimate,
            );
            if (dynItemsPerPage < 5) dynItemsPerPage = 5;
            for (let i = 0; i < poemMapping.length; i += dynItemsPerPage) {
              const chunk = poemMapping.slice(i, i + dynItemsPerPage);
              const titleHTML =
                i === 0
                  ? `<h2 style="text-align: center; font-size: ${tSize}px; margin-bottom: 20px; line-height: 2.0; font-family: '${tFont}'; width: 100%; color: ${tColor}; padding-bottom: 10px;">${processContent(customTitle)}</h2>`
                  : `<div style="height: 20px;"></div>`;
              addPage(`
                <div class="header-layer">
                <span style="font-family:'Payami Nastaleeq'; font-weight:bold; font-size:20px; padding-bottom:10px;">${toUrduDigits(globalPageNum++)}</span>
                </div>
                ${borderHTML}
                <div class="content-layer">
                ${titleHTML}
                <div style="width: 100%; display: flex; flex-direction: column; gap: 0; direction: rtl;">
                ${chunk
                  .map(
                    (item) => `
                <a href="#${item.linkId}" style="display: flex; justify-content: space-between; width: 100%; padding: 6px 0; border-bottom: 1px solid #ddd; text-decoration: none; align-items: center; line-height: ${iLineH}; direction: rtl; font-size:${iSize}px; color:${iColor}; font-family:'${iFont}'; cursor:pointer;">
                <span style="text-align: right;">${processContent(item.title || "بے عنوان")}</span>
                <span style="text-align: left;">${toUrduDigits(item.startPage)}</span>
                </a>`,
                  )
                  .join("")}
                </div>
                </div>
                <div class="footer-layer">
                <span style="font-family:'Payami Nastaleeq'; color:#ccc; font-size:14px; padding:0 ${pagePadding + 10}px; text-align:center; overflow:hidden; white-space:nowrap; padding-top:5px; padding-bottom:10px; width:100%; line-height:1.5;">${currentBookSettings.watermark || ""}</span>
                </div>
                `);
            }
            poemMapping.forEach((item) => {
              item.generatedPages.forEach((pageBlocks, idx) => {
                addPage(`
                    <div class="header-layer">
                    <div style="width:100%; display:flex; justify-content:space-between; padding:0 ${pagePadding + 10}px; font-size:20px; font-family:'${uiFont}'; box-sizing: border-box; direction: rtl; line-height: 1.5;">

                    <span style="font-weight:bold; font-size:20px; text-align:center; min-width:40px; padding-bottom:10px;">${toUrduDigits(globalPageNum)}</span>

            window.location.reload();

          const totalDays = Math.floor(distance / (1000 * 60 * 60 * 24));

          const days = totalDays % 30;
          const hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),

          const minutes = Math.floor(
            (distance % (1000 * 60 * 60)) / (1000 * 60),
          );
          const seconds = Math.floor((distance % (1000 * 60)) / 1000);
          const parts = [];
          if (months > 0) parts.push(`${months} ماہ`);
          if (days > 0) parts.push(`${days} دن`);
          if (hours > 0) parts.push(`${hours} گھنٹے`);
          parts.push(`${minutes} منٹ`);
          parts.push(`${seconds} سیکنڈ`);
          timerText.innerHTML = parts.join(

      function sortItems(a, b) {
        const valA =
          a.order !== undefined
            ? a.order
            : a.timestamp
              ? a.timestamp.toMillis()
              : 0;
        const valB =
          b.order !== undefined
            ? b.order
            : b.timestamp
              ? b.timestamp.toMillis()
              : 0;

        const draggedIdx = list.findIndex((i) => i.id === draggedItem.id);
        const targetIdx = list.findIndex((i) => i.id === targetId);
        if (draggedIdx === -1 || targetIdx === -1) return;
        const sortedList = [...list].sort(sortItems);
        const vDragIdx = sortedList.findIndex((i) => i.id === draggedItem.id);
        const vTargetIdx = sortedList.findIndex((i) => i.id === targetId);
        const item = sortedList[vDragIdx];
        const target = sortedList[vTargetIdx];
        let newOrder;
        let neighborAbove, neighborBelow;
        if (vDragIdx > vTargetIdx) {
          neighborBelow = target;
          neighborAbove = vTargetIdx > 0 ? sortedList[vTargetIdx - 1] : null;
        } else {
          neighborAbove = target;
          neighborBelow =
            vTargetIdx < sortedList.length - 1
              ? sortedList[vTargetIdx + 1]
              : null;
        }
        const valAbove = neighborAbove
          ? neighborAbove.order !== undefined
            ? neighborAbove.order
            : neighborAbove.timestamp.toMillis()
          : null;
        const valBelow = neighborBelow
          ? neighborBelow.order !== undefined
            ? neighborBelow.order
            : neighborBelow.timestamp.toMillis()
          : null;

                .collection("books")
                .doc(draggedItem.id)

                .collection("users")

                .collection("books")
                .doc(currentBookId)

      const applyAutoFont = (text) => {
        if (!text) return "";
        const safeText = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
        return safeText
          .split(/([\s\u060C\u061B\u061F\u06D4:!۔\.,\-]+)/)
          .map((part) => {
            if (part.trim().length === 0) return part;
            let word = part;
            const len = word.length;
            const startsWithAl =
              len >= 2 &&
              word.charCodeAt(0) === 0x0627 &&
              word.charCodeAt(1) === 0x0644;
            let endsWithKhadaYaa = false;
            if (len >= 2) {
              const last = word.charCodeAt(len - 1);
              const secondLast = word.charCodeAt(len - 2);
              const isYa = (c) =>
                c === 0x0649 || c === 0x064a || c === 0x06cc || c === 0x06d2;
              const case1 = last === 0x0670 && isYa(secondLast);
              const case2 = isYa(last) && secondLast === 0x0670;
              if (case1 || case2) endsWithKhadaYaa = true;
            }
            let isFullyVowelized = true;
            let hasBaseLetter = false;
            let diacriticCount = 0;
            let baseStr = "";
            let lastBaseIndex = -1;
            for (let i = 0; i < word.length; i++) {
              const c = word.charCodeAt(i);
              const isDiacritic =
                (c >= 0x064b && c <= 0x065f) ||
                c === 0x0670 ||
                c === 0x0656 ||
                c === 0x0657 ||
                c === 0x06e1;
              if (isDiacritic) {
                diacriticCount++;
                continue;
              }
              const isBaseLetter =
                ((c >= 0x0621 && c <= 0x064a) ||
                  (c >= 0x066e && c <= 0x06d3)) &&
                c !== 0x0670;
              if (isBaseLetter) {
                baseStr += word[i];
                lastBaseIndex = i;
                if (c === 0x0627 || c === 0x0622) continue;
                hasBaseLetter = true;
                if (isFullyVowelized) {
                  if (i + 1 >= word.length) {
                    isFullyVowelized = false;
                  } else {
                    const next = word.charCodeAt(i + 1);
                    const nextIsDiacritic =
                      (next >= 0x064b && next <= 0x065f) ||
                      next === 0x0670 ||
                      next === 0x0656 ||
                      next === 0x0657 ||
                      next === 0x06e1;
                    if (!nextIsDiacritic) isFullyVowelized = false;
                  }
                }
              }
            }
            const validAllahBases = [
              "\u0627\u0644\u0644\u0647",
              "\u0644\u0644\u0647",
              "\u0627\u0644\u0644\u06C1",
              "\u0644\u0644\u06C1",
            ];
            let isAllahWithDiacriticOnHe = false;
            if (validAllahBases.includes(baseStr) && lastBaseIndex !== -1) {
              for (let j = lastBaseIndex + 1; j < word.length; j++) {
                const dc = word.charCodeAt(j);
                const isDia =
                  (dc >= 0x064b && dc <= 0x065f) ||
                  dc === 0x0670 ||
                  dc === 0x0656 ||
                  dc === 0x0657 ||
                  dc === 0x06e1;
                if (isDia) {
                  isAllahWithDiacriticOnHe = true;
                  break;
                }
              }
            }
            if (hasBaseLetter || isAllahWithDiacriticOnHe) {
              if (isFullyVowelized)
                return `<span class="font-alqalam">${word}</span>`;
              if (startsWithAl && diacriticCount >= 2)
                return `<span class="font-alqalam">${word}</span>`;
              if (endsWithKhadaYaa && diacriticCount >= 2)
                return `<span class="font-alqalam">${word}</span>`;
              if (isAllahWithDiacriticOnHe)
                return `<span class="font-alqalam">${word}</span>`;
            }
            return word;
          })
