      };
      window.showQawafiModal = () => {
        const existing = document.getElementById("universalModal");
        if (existing) existing.remove();
        const m = document.createElement("div");
        m.id = "universalModal";
        m.className =
          "fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-[100] backdrop-blur-sm p-4";
        const c = document.createElement("div");
        c.className =
          "bg-white rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden animate-fade-in-up";
        const h = document.createElement("div");
        h.className =
          "p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0";
        h.innerHTML =
          '<h2 class="text-xl font-bold font-jameel">قوافی تلاش کریں</h2><button onclick="document.getElementById(\'universalModal\').remove()" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>';
        const b = document.createElement("div");
        b.className = "p-4 overflow-y-auto grow custom-scrollbar relative";
        const i = document.createElement("input");
        i.className =
          "w-full border-2 border-purple-200 p-3 rounded-lg mb-4 text-center sticky top-0 bg-white z-10 shadow-sm focus:ring-2 focus:ring-purple-500 outline-none";
        i.placeholder = "کوئی لفظ لکھیں (مثلاً: دل)...";
        const d = document.createElement("div");
        d.className = "flex flex-wrap gap-2 content-start pb-4";
        const uSort = "آابپتٹثجچحخدڈذرڑزژسشصضطظعغفقکگلمنںوؤہۂءئیےۓ";
        const sortFn = (a, b) => {
          const x = a.word || "",
            y = b.word || "",
            l = Math.min(x.length, y.length);
          for (let k = 0; k < l; k++) {
            const ix = uSort.indexOf(x[k]),
              iy = uSort.indexOf(y[k]);
            if (ix !== iy) return (ix < 0 ? 999 : ix) - (iy < 0 ? 999 : iy);
          }
          return x.length - y.length;
        };
        i.oninput = (e) => {
          const v = e.target.value.trim();
          d.innerHTML = "";
          if (v.length < 2) return;
          const end = v.slice(-2);
          const matches = aozanData
            .filter((w) => w.word && w.word.slice(-2) === end)
            .sort(sortFn);
          if (matches.length === 0) {
            d.innerHTML =
              '<p class="text-gray-500 w-full text-center mt-4 font-jameel">کوئی قافیہ نہیں ملا</p>';
            return;
          }
          matches.forEach((w) => {
            const btn = document.createElement("button");
            btn.className =
              "bg-gray-50 border border-gray-200 px-4 py-2 rounded-lg hover:bg-purple-600 hover:text-white transition shadow-sm font-jameel text-lg";
            btn.textContent = w.word;
            btn.onclick = () => {
              selectedRhymes.add(w.word);
              updateRhymeDisplay();
              btn.remove();
            };
            d.appendChild(btn);
          });
        };
        b.appendChild(i);
        b.appendChild(d);
        c.appendChild(h);
        c.appendChild(b);
        m.appendChild(c);
        document.body.appendChild(m);
        i.focus();
      };
      function updateRhymeDisplay() {
        const d = document.getElementById("selectedRhymesDisplay");
        d.innerHTML = "";
        selectedRhymes.forEach((r) => {
          const s = document.createElement("span");
          s.className =
            "bg-sky-100 text-sky-800 px-3 py-1 rounded-full text-sm flex items-center gap-2 cursor-pointer shadow-sm border border-sky-200 whitespace-nowrap";
          s.innerHTML = `${r} <i class="fas fa-times text-xs"></i>`;
          s.onclick = () => {
            selectedRhymes.delete(r);
            updateRhymeDisplay();
          };
          d.appendChild(s);
        });
      }
      window.copyEditorFull = (btn) => {
        const title = document.getElementById("poemTitle").value.trim();
        const content = document.getElementById("poemContent").innerText;
        const fullText = (title ? title + "\n\n" : "") + content;
        if (!fullText.trim()) return alert("کاپی کرنے کے لیے کچھ لکھیں!");
        navigator.clipboard
          .writeText(fullText)
          .then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => (btn.innerHTML = original), 1500);
          })
          .catch((err) => alert("کاپی نہیں ہوسکا: " + err));
      };
      window.showPasteModal = () => {
        openUniversalModal(
          "تصدیق",
          (c) =>
            (c.innerHTML =
              '<p class="text-center text-lg leading-relaxed font-jameel">کیا آپ سابقہ تحریر ہٹا کر کاپی شدہ تحریر پیسٹ کرنا چاہتے ہیں؟</p>'),
          `<button onclick="pasteFromClipboard()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">جی ہاں</button><button onclick="closeUniversalModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded font-bold hover:bg-gray-300 transition">نہیں</button>`,
        );
      };
      window.pasteFromClipboard = async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (!text) {
            alert("کلپ بورڈ خالی ہے! پہلے کچھ کاپی کریں۔");
            closeUniversalModal();
            return;
          }
          const safeText = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
          const formattedHTML = safeText
            .split("\n")
            .map((line) => `<div>${line.trim() || "<br>"}</div>`)
            .join("");
          const editor = document.getElementById("poemContent");
          if (editor) {
            editor.innerHTML = formattedHTML;
          }
          closeUniversalModal();
        } catch (err) {
          console.error(err);
          alert(
            "پیسٹ نہیں ہوسکا۔\nبراؤزر نے اجازت نہیں دی یا آپ HTTPS استعمال نہیں کر رہے۔\nبراہ کرم کی بورڈ سے (Ctrl + V) استعمال کریں۔",
          );
          closeUniversalModal();
        }
      };
      window.showClearEditorModal = () =>
        openUniversalModal(
          "تصدیق",
          (c) =>
            (c.innerHTML =
              '<p class="text-center text-lg font-jameel">کیا آپ پوری تحریر ڈیلیٹ کرنا چاہتے ہیں؟</p>'),
          `<button onclick="clearEditorContent()" class="flex-1 bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700 transition">جی ہاں</button><button onclick="closeUniversalModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded font-bold hover:bg-gray-300 transition">نہیں</button>`,
        );
      window.clearEditorContent = () => {
        document.getElementById("poemContent").innerHTML = "<div><br></div>";
        document.getElementById("poemTitle").value = "";
        closeUniversalModal();
      };
      window.clearEditorContent = () => {
        document.getElementById("poemContent").innerHTML = "<div><br></div>";
        document.getElementById("poemTitle").value = "";
        closeUniversalModal();
      };
      window.onload = function () {
        auth.onAuthStateChanged((user) => {
          if (user) {
            currentUser = user;
            loadPageSizeFromFirestore();
          }
        });
        const editor = document.getElementById("poemContent");
        editor.setAttribute("inputmode", "none");
        editor.addEventListener("click", (e) => {
          if (editor.getAttribute("inputmode") !== "text") {
            editor.setAttribute("inputmode", "none");
          }
          const sel = window.getSelection();
          if (!sel.rangeCount) {
            const range = document.createRange();
            let target = e.target;
            if (target.tagName === "TD") {
              range.selectNodeContents(target);
            } else {
              range.setStart(target, 0);
              range.collapse(true);
            }
            sel.removeAllRanges();
            sel.addRange(range);
          }
        });
        editor.addEventListener("dblclick", () => {
          editor.setAttribute("inputmode", "text");
          setTimeout(() => {
            editor.focus();
          }, 50);
        });
        editor.addEventListener("blur", () => {
          editor.setAttribute("inputmode", "none");
        });
      };
      window.onpopstate = (e) => {
        const pdfOverlay = document.getElementById("pdf-preview-overlay");
        if (pdfOverlay) {
          pdfOverlay.remove();
          ["pdfBtn", "previewPoem"].forEach((id) => {
            const b = document.getElementById(id);
            if (b && b.disabled) {
              if (id === "pdfBtn")
                b.innerHTML = '<i class="far fa-file-pdf"></i> پی ڈی ایف';
              if (id === "previewPoem")
                b.innerHTML = '<i class="fas fa-eye"></i> دیکھیں';
              b.disabled = false;
            }
          });
          return;
        }
        const uModal = document.getElementById("universalModal");
        if (uModal) {
          uModal.remove();
          return;
        }
        const tools = document.getElementById("toolsModalOverlay");
        if (tools) {
          tools.remove();
          return;
        }
        const admin = document.getElementById("adminModal");
        if (admin && !admin.classList.contains("hidden")) {
          admin.classList.add("hidden");
          return;
        }
        const v = e.state ? e.state.view : "dashboard";
        switchScreen(v, false);
        if (v === "dashboard") loadBooks();
        else if (v === "bookView") loadPoems();
      };
      const _orgOpenUniversal = window.openUniversalModal;
      window.openUniversalModal = (t, c, f) => {
        history.pushState({ modal: true }, null, "");
        _orgOpenUniversal(t, c, f);
      };
      window.closeUniversalModal = () => {
        if (history.state && history.state.modal) history.back();
        else document.getElementById("universalModal")?.remove();
      };
      const _orgOpenTools = window.openToolsModal;
      window.openToolsModal = async () => {
        history.pushState({ modal: true }, null, "");
        await _orgOpenTools();
      };
      window.closeToolsModal = (e) => {
        if (e.target.id === "toolsModalOverlay") {
          if (history.state && history.state.modal) history.back();
          else e.target.remove();
        }
      };
      document.addEventListener("click", (e) => {
        if (e.target.closest("#adminBtnTrigger")) {
          history.pushState({ modal: "admin" }, null, "");
        }
      });
    </script>
  </body>
</html>
